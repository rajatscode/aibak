<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>strat.club</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --blue:#2563eb;--red:#dc2626;--green:#3fb950;--gold:#e3b341;
  --neutral:#4b5563;--fog:#1f2937;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text)}
#app{display:flex;flex-direction:column;height:100vh}

/* TOP BAR */
#topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--border);min-height:48px;flex-shrink:0;gap:12px}
#topbar h1{font-size:16px;font-weight:700;color:var(--gold);letter-spacing:1px}
#topbar .stats{display:flex;gap:16px;font-size:13px;color:var(--text2)}
#topbar .stats span{display:flex;align-items:center;gap:4px}
#topbar .stats .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
#topbar button{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:4px 12px;cursor:pointer;font-size:12px;transition:background .15s}
#topbar button:hover{background:var(--border)}
#topbar .controls{display:flex;align-items:center;gap:8px}
#topbar select{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px;cursor:pointer}

/* WIN PROBABILITY BAR */
#win-prob-bar{display:none;height:6px;background:var(--red);flex-shrink:0;position:relative;overflow:hidden}
#win-prob-bar .blue-side{height:100%;background:var(--blue);transition:width 0.6s ease}
#win-prob-bar .prob-text{position:absolute;top:-1px;font-size:9px;font-weight:700;color:#fff;line-height:8px;pointer-events:none;text-shadow:0 1px 2px rgba(0,0,0,.8)}
#win-prob-bar .prob-text.left{left:8px}
#win-prob-bar .prob-text.right{right:8px}

/* MAIN LAYOUT */
#main{display:flex;flex:1;overflow:hidden}
#map-container{flex:1;position:relative;overflow:hidden;background:radial-gradient(ellipse at 50% 45%, #111d2e 0%, #0c1520 40%, #080e14 100%)}
#sidebar{width:340px;min-width:340px;background:linear-gradient(180deg, var(--bg2) 0%, #131820 100%);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}

/* SVG MAP */
#map-svg{width:100%;height:100%}
.territory-path{cursor:pointer;transition:fill .2s ease,stroke .2s ease,opacity .2s ease,filter .2s ease}
.territory-path:hover{filter:brightness(1.35) drop-shadow(0 0 8px rgba(255,255,255,.2)) drop-shadow(0 0 16px rgba(255,255,255,.08))}
.territory-highlight{pointer-events:none;transition:stroke .2s ease,stroke-width .2s ease}
.army-text{pointer-events:none;font-size:13px;font-weight:700;fill:#fff;text-anchor:middle;dominant-baseline:central}
.army-text.large-army{font-size:15px}
.deploy-badge{pointer-events:none;font-size:10px;font-weight:700;fill:var(--green);text-anchor:middle;dominant-baseline:central}
.name-text{pointer-events:none;font-size:9px;fill:var(--text2);text-anchor:middle;opacity:0;transition:opacity .15s}
.territory-group:hover .name-text{opacity:1}
.bonus-tint{pointer-events:none;opacity:0.08;transition:opacity .3s ease}
.pick-ring{pointer-events:none;fill:none;stroke:var(--gold);stroke-width:3}
.pick-rank{pointer-events:none;font-size:16px;font-weight:900;fill:var(--gold);text-anchor:middle;dominant-baseline:central;text-shadow:0 0 4px rgba(0,0,0,1),0 0 8px rgba(0,0,0,.8)}
.pick-ring-anim{animation:pulse-ring 1.2s ease-in-out infinite}
@keyframes pulse-ring{0%,100%{r:22;opacity:1}50%{r:28;opacity:.4}}
.selected-ring{fill:none;stroke:var(--gold);stroke-width:3;pointer-events:none}
.selected-highlight{animation:pulse-gold 1.2s ease-in-out infinite}
@keyframes pulse-gold{0%,100%{stroke-width:3;stroke:var(--gold)}50%{stroke-width:5;stroke:#fbbf24}}
.picked-ring{fill:none;stroke:var(--green);stroke-width:3;pointer-events:none}
.order-line{stroke-width:2;stroke-dasharray:6,3;fill:none;marker-end:url(#arrowhead)}
.plus-one{pointer-events:none;font-size:14px;font-weight:700;fill:var(--green);text-anchor:middle;animation:float-up .6s ease-out forwards}
@keyframes float-up{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-25px)}}

/* ANIMATED ARROWS */
.anim-arrow{stroke-dasharray:12,6;animation:dash-flow .6s linear infinite}
@keyframes dash-flow{to{stroke-dashoffset:-18}}
.combat-text{pointer-events:none;font-size:11px;font-weight:700;text-anchor:middle;dominant-baseline:central;text-shadow:0 1px 3px rgba(0,0,0,.8)}

/* REPLAY TURN STEPPER */
#replay-stepper{display:none;position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,rgba(13,17,23,.85),rgba(13,17,23,.97));border-top:1px solid var(--border);padding:10px 20px;z-index:100;backdrop-filter:blur(8px)}
#replay-stepper .stepper-row{display:flex;align-items:center;gap:10px}
#replay-stepper button{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:6px;width:34px;height:34px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s}
#replay-stepper button:hover:not(:disabled){background:var(--border);border-color:var(--text3)}
#replay-stepper button:disabled{opacity:.3;cursor:not-allowed}
#replay-stepper button.active{background:var(--blue);border-color:var(--blue)}
#replay-stepper .turn-display{font-size:13px;font-weight:600;color:var(--text);min-width:100px;text-align:center}
#replay-stepper .slider-wrap{flex:1;display:flex;align-items:center}
#replay-stepper input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;background:var(--bg3);border-radius:3px;outline:none;cursor:pointer}
#replay-stepper input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;background:var(--blue);border-radius:50%;cursor:pointer;border:2px solid var(--text);transition:transform .15s}
#replay-stepper input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.2)}
#replay-stepper input[type=range]::-moz-range-thumb{width:16px;height:16px;background:var(--blue);border-radius:50%;cursor:pointer;border:2px solid var(--text)}
#replay-exit-btn{background:var(--bg3);color:var(--gold);border:1px solid var(--gold);border-radius:6px;padding:6px 16px;width:auto;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s}
#replay-exit-btn:hover{background:rgba(227,179,65,.15)}

/* REPLAY SPARKLINE (sidebar) */
#replay-sparkline{display:none;padding:12px;border-bottom:1px solid var(--border)}
#replay-sparkline h3{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}

/* REPLAY LOG (sidebar) */
#replay-log{display:none;flex:1;overflow-y:auto;padding:8px 12px;font-size:12px;line-height:1.6}
#replay-log .log-entry{padding:2px 0}
#replay-log .log-player{color:#60a5fa}
#replay-log .log-enemy{color:#f87171}
#replay-log .log-system{color:var(--gold)}

/* MAP ARMY POPUP */
#map-army-popup{position:absolute;display:none;background:var(--bg2);border:2px solid var(--gold);border-radius:8px;padding:6px 10px;z-index:200;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.6)}
#map-army-popup .popup-label{font-size:11px;color:var(--text2);margin-bottom:4px;text-align:center}
#map-army-popup .popup-row{display:flex;align-items:center;gap:6px}
#map-army-popup button{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:4px;width:28px;height:28px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
#map-army-popup button:hover{background:var(--border)}
#map-army-popup .popup-count{font-size:18px;font-weight:700;min-width:32px;text-align:center;color:var(--text)}
#map-army-popup .popup-go{background:var(--blue);color:#fff;border:none;border-radius:4px;padding:4px 14px;cursor:pointer;font-size:13px;font-weight:600;width:auto}
#map-army-popup .popup-go:hover{background:#3b82f6}

/* TERRITORY FLASH */
.flash-deploy{animation:flash-green .4s ease-out}
@keyframes flash-green{0%{filter:brightness(2) saturate(1.5)}100%{filter:none}}
.flash-capture{animation:flash-capture .5s ease-out}
@keyframes flash-capture{0%{filter:brightness(2.5) saturate(2)}50%{filter:brightness(1.5)}100%{filter:none}}
.flash-fail{animation:flash-fail .3s ease-out}
@keyframes flash-fail{0%{filter:brightness(0.5) saturate(0.3)}100%{filter:none}}

/* CONNECTION LINES */
.connection-line{stroke:var(--bg3);stroke-width:1;opacity:.3}

/* SIDEBAR SECTIONS */
.sb-section{padding:12px;border-bottom:1px solid var(--border)}
.sb-section h3{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.sb-phase{font-size:18px;font-weight:700;margin-bottom:4px}
.sb-sub{font-size:13px;color:var(--text2)}

/* DEPLOY COUNTER */
.deploy-counter{font-size:28px;font-weight:800;color:var(--green);text-align:center;padding:8px 0}
.deploy-hint{font-size:11px;color:var(--text3);text-align:center}

/* ORDER LIST */
.order-list{flex:1;overflow-y:auto;padding:8px 12px}
.order-item{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;background:var(--bg);border-radius:6px;margin-bottom:4px;font-size:12px;border:1px solid var(--border)}
.order-item .remove-btn{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;padding:0 4px}
.order-item .remove-btn:hover{color:#f87171}

/* ARMY SELECTOR */
.army-selector{display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--bg);border-radius:6px;margin:6px 0;border:1px solid var(--border)}
.army-selector button{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:4px;width:28px;height:28px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.army-selector button:hover{background:var(--border)}
.army-selector .army-count{font-size:16px;font-weight:700;min-width:30px;text-align:center}
.army-selector .confirm-order{background:var(--blue);color:#fff;border:none;border-radius:4px;padding:4px 12px;cursor:pointer;font-size:12px;font-weight:600;margin-left:auto}
.army-selector .confirm-order:hover{background:#3b82f6}
.army-selector .cancel-order{background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:4px;padding:4px 8px;cursor:pointer;font-size:12px;width:auto}

/* BUTTONS */
.btn{display:block;width:100%;padding:10px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600;transition:background .15s,opacity .15s}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover:not(:disabled){background:#3b82f6}
.btn-green{background:var(--green);color:#000}
.btn-green:hover:not(:disabled){background:#4ade80}
.btn-gold{background:var(--gold);color:#000}
.btn-gold:hover:not(:disabled){background:#fbbf24}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover:not(:disabled){background:#ef4444}

/* TURN LOG */
#turn-log{flex:1;overflow-y:auto;padding:8px 12px;font-size:12px;line-height:1.6}
#turn-log .log-entry{padding:2px 0;opacity:0;transform:translateX(-10px);animation:slide-in .3s ease-out forwards}
@keyframes slide-in{to{opacity:1;transform:translateX(0)}}
#turn-log .log-player{color:#60a5fa}
#turn-log .log-enemy{color:#f87171}
#turn-log .log-system{color:var(--gold)}

/* HISTORY */
.history-section{overflow-y:auto;max-height:200px}
.history-turn{border-bottom:1px solid var(--border)}
.history-header{padding:6px 12px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);display:flex;justify-content:space-between;align-items:center}
.history-header:hover{background:var(--bg3)}
.history-body{padding:4px 12px 8px;font-size:11px;line-height:1.6;display:none}
.history-body.open{display:block}

/* PICKS LIST */
.pick-list{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.pick-chip{background:var(--bg);border:1px solid var(--green);color:var(--green);border-radius:12px;padding:2px 10px;font-size:11px;cursor:pointer}
.pick-chip:hover{background:var(--green);color:#000}

/* TOAST */
#toast-container{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 20px;font-size:13px;opacity:0;transform:translateY(-10px);transition:opacity .3s,transform .3s;pointer-events:auto}
.toast.show{opacity:1;transform:translateY(0)}
.toast.error{border-color:var(--red);background:#2d1013}
.toast.success{border-color:var(--green);background:#0d2818}

/* GAME OVER OVERLAY */
#game-over{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:999}
#game-over.show{display:flex}
#game-over .card{background:var(--bg2);border:2px solid var(--border);border-radius:16px;padding:40px 60px;text-align:center;max-width:500px}
#game-over .card h2{font-size:32px;margin-bottom:12px}
#game-over .card p{color:var(--text2);margin-bottom:16px}
#game-over .card button{padding:12px 32px;font-size:16px}
#game-over .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;text-align:left}
#game-over .stat-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px}
#game-over .stat-item .stat-label{font-size:10px;color:var(--text3);text-transform:uppercase}
#game-over .stat-item .stat-value{font-size:18px;font-weight:700}
#game-over .sparkline-container{margin-bottom:20px}
#game-over .sparkline-container h4{font-size:11px;color:var(--text3);text-transform:uppercase;margin-bottom:4px}

/* TEMPLATE MODAL */
#template-modal{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:1000}
#template-modal.show{display:flex}
#template-modal .modal-content{text-align:center}
#template-modal .modal-content h2{font-size:24px;font-weight:700;color:var(--gold);margin-bottom:6px}
#template-modal .modal-content p{color:var(--text2);font-size:13px;margin-bottom:24px}
#template-modal .template-cards{display:flex;gap:20px}
.template-card{background:var(--bg2);border:2px solid var(--border);border-radius:16px;padding:32px 28px;cursor:pointer;transition:all .2s ease;width:240px;text-align:center}
.template-card:hover{border-color:var(--gold);transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.template-card h3{font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px}
.template-card .template-info{font-size:13px;color:var(--text2);margin-bottom:12px;line-height:1.5}
.template-card .template-icon{font-size:36px;margin-bottom:12px}

/* TRANSITION FLASH */
.phase-flash{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6);z-index:500;pointer-events:none;opacity:0;transition:opacity .3s}
.phase-flash.show{opacity:1}
.phase-flash span{font-size:24px;font-weight:800;color:var(--gold);text-shadow:0 0 20px rgba(227,179,65,.5)}

/* BONUS ROW */
.bonus-row{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:11px}
.bonus-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.bonus-row.complete{animation:glow-green .6s ease-out}
@keyframes glow-green{0%{background:rgba(63,185,80,.2)}100%{background:transparent}}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}

/* TOOLTIP */
.tooltip{position:absolute;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:11px;pointer-events:none;z-index:100;white-space:nowrap;opacity:0;transition:opacity .15s;line-height:1.6}
.tooltip.show{opacity:1}
.tooltip .tip-name{font-weight:700;font-size:12px;margin-bottom:2px}
.tooltip .tip-bonus{display:flex;align-items:center;gap:4px}
.tooltip .tip-bonus .bonus-dot{width:6px;height:6px;border-radius:2px;display:inline-block}
.tooltip .tip-hint{color:var(--text3);font-size:10px;margin-top:2px}

/* UNDEPLOYED WARNING */
.undeployed-warning{color:#f59e0b;font-size:12px;font-weight:600;text-align:center;padding:4px 0}

/* THREAT HEATMAP */
.territory-path.threat-overlay{transition:fill .3s ease}

/* CHAT PANEL */
#chat-panel{border-top:1px solid var(--border);display:flex;flex-direction:column;max-height:280px;min-height:0;transition:max-height .3s ease}
#chat-panel.collapsed{max-height:32px;min-height:32px}
#chat-panel.collapsed #chat-messages,#chat-panel.collapsed #chat-emoji-bar,#chat-panel.collapsed #chat-input-row{display:none}
#chat-toggle{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;cursor:pointer;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;background:var(--bg2);user-select:none}
#chat-toggle:hover{color:var(--text)}
#chat-toggle .chat-arrow{transition:transform .2s}
#chat-panel.collapsed #chat-toggle .chat-arrow{transform:rotate(180deg)}
#chat-messages{flex:1;overflow-y:auto;padding:6px 10px;font-size:12px;line-height:1.5;min-height:60px;max-height:180px;scroll-behavior:smooth}
.chat-msg{padding:2px 0;animation:slide-in .2s ease-out forwards;opacity:0;transform:translateX(-6px)}
.chat-msg.player-msg{color:#60a5fa}
.chat-msg.ai-msg{color:#f87171}
.chat-msg.system-msg{color:var(--gold);font-style:italic;font-size:11px}
.chat-msg .chat-sender{font-weight:700;margin-right:4px}
#chat-emoji-bar{display:flex;gap:4px;padding:4px 10px}
#chat-emoji-bar button{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:2px 8px;cursor:pointer;font-size:14px;transition:background .15s,transform .1s}
#chat-emoji-bar button:hover{background:var(--bg3);transform:scale(1.15)}
#chat-input-row{display:flex;gap:4px;padding:4px 10px 8px}
#chat-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--text);font-size:12px;outline:none}
#chat-input:focus{border-color:var(--blue)}
#chat-send-btn{background:var(--blue);color:#fff;border:none;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;font-weight:600;transition:background .15s}
#chat-send-btn:hover{background:#3b82f6}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <h1>strat.club</h1>
    <div class="stats">
      <span>Turn <strong id="turn-num">1</strong></span>
      <span>Income <strong id="income-num">5</strong></span>
      <span><span class="dot" style="background:var(--blue)"></span> <strong id="my-terr">0</strong></span>
      <span><span class="dot" style="background:var(--red)"></span> <strong id="enemy-terr">0</strong></span>
    </div>
    <div class="controls">
      <select id="difficulty-select" onchange="setDifficulty(this.value)" title="AI Difficulty">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard" selected>Hard</option>
      </select>
      <button id="threat-toggle" onclick="toggleThreats()" title="Toggle Threat Heatmap">Threats</button>
      <button id="mute-toggle" onclick="toggleMute()" title="Toggle Sound">Sound</button>
      <button onclick="newGame()" title="New Game (N)">New Game</button>
    </div>
  </div>
  <div id="win-prob-bar">
    <div class="blue-side" id="win-prob-blue" style="width:50%"></div>
    <span class="prob-text left" id="win-prob-text-left"></span>
    <span class="prob-text right" id="win-prob-text-right"></span>
  </div>
  <div id="main">
    <div id="map-container">
      <svg id="map-svg" viewBox="0 0 900 470"></svg>
      <div id="map-army-popup">
        <div class="popup-label" id="popup-label"></div>
        <div class="popup-row">
          <button onclick="popupAdjust(-1)">-</button>
          <span class="popup-count" id="popup-count">0</span>
          <button onclick="popupAdjust(1)">+</button>
          <button class="popup-go" onclick="popupConfirm()">Go</button>
        </div>
      </div>
      <div class="phase-flash" id="phase-flash"><span id="flash-text"></span></div>
      <div class="tooltip" id="tooltip"></div>
      <div id="replay-stepper">
        <div class="stepper-row">
          <button id="rs-prev" onclick="replayStep(-1)" title="Previous turn (Left arrow)">&#9664;</button>
          <span class="turn-display" id="rs-turn-display">Turn 1 of 1</span>
          <button id="rs-next" onclick="replayStep(1)" title="Next turn (Right arrow)">&#9654;</button>
          <button id="rs-play" onclick="replayToggleAutoPlay()" title="Auto-play (Space)">&#9654;&#xFE0E;</button>
          <div class="slider-wrap">
            <input type="range" id="rs-slider" min="0" max="1" value="0" oninput="replaySliderChange(this.value)">
          </div>
          <button id="replay-exit-btn" onclick="exitReplayMode()">Exit Review</button>
        </div>

<script>
// ========== CONSTANTS ==========
// POS is populated dynamically from API territory label_x/label_y
const POS = {};
const BONUS_COLORS=['#58a6ff','#e3b341','#f0883e','#bc8cff','#3fb950','#f778ba'];
const PLAYER_COLOR='#2563eb';
const ENEMY_COLOR='#dc2626';
const NEUTRAL_COLOR='#4b5563';
const FOG_COLOR='#1f2937';

// ========== STATE ==========
let G = null; // game state
let phase = 'loading'; // picking | orders | finished
let picks = [];
let deploys = {}; // territory_id -> count
let deployLeft = 0;
let orders = []; // [{type, from?, to?, territory?, armies}]
let selectedSource = null;
let pendingTarget = null;
let pendingArmies = 0;
let pendingMax = 0;
let pendingType = ''; // 'attack' or 'transfer'
let editingOrderIdx = null; // index of order being edited in sidebar
let resolving = false;
let threatsEnabled = false;
let muted = false;
let winProbHistory = []; // track win% over turns for sparkline
let gameStats = { turnsPlayed: 0, captured: 0, lost: 0 };
let selectedTemplate = null;

// ========== SOUND ENGINE (Web Audio API) ==========
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playSound(type) {
  if (muted) return;
  try {
    const ctx = getAudioCtx();
    const vol = ctx.createGain();
    vol.connect(ctx.destination);
    const now = ctx.currentTime;

    if (type === 'tick') {
      vol.gain.setValueAtTime(0.12, now);
      vol.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(800, now);
      osc.connect(vol);
      osc.start(now);
      osc.stop(now + 0.05);
    } else if (type === 'deploy') {
      vol.gain.setValueAtTime(0.15, now);
      vol.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, now);
      osc.frequency.linearRampToValueAtTime(400, now + 0.08);
      osc.connect(vol);
      osc.start(now);
      osc.stop(now + 0.08);
    } else if (type === 'attack') {
      vol.gain.setValueAtTime(0.1, now);
      vol.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      const bufferSize = ctx.sampleRate * 0.1;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
      const noise = ctx.createBufferSource();
      noise.buffer = buffer;
      const bp = ctx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.setValueAtTime(1000, now);
      bp.Q.setValueAtTime(2, now);
      noise.connect(bp);
      bp.connect(vol);
      noise.start(now);
      noise.stop(now + 0.1);
    } else if (type === 'capture') {
      vol.gain.setValueAtTime(0.15, now);
      vol.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
      const osc = ctx.createOscillator();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(1200, now);
      osc.connect(vol);
      osc.start(now);
      osc.stop(now + 0.2);
    } else if (type === 'win') {
      vol.gain.setValueAtTime(0.12, now);
      vol.gain.linearRampToValueAtTime(0.12, now + 0.4);
      vol.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
      [523.25, 659.25, 783.99].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, now);
        osc.connect(vol);
        osc.start(now + i * 0.05);
        osc.stop(now + 0.5);
      });
    } else if (type === 'lose') {
      vol.gain.setValueAtTime(0.15, now);
      vol.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.linearRampToValueAtTime(200, now + 0.3);
      osc.connect(vol);
      osc.start(now);
      osc.stop(now + 0.3);
    }
  } catch(e) { /* audio errors are non-fatal */ }
}

function toggleMute() {
  muted = !muted;
  document.getElementById('mute-toggle').textContent = muted ? 'Muted' : 'Sound';
  document.getElementById('mute-toggle').style.opacity = muted ? '0.5' : '1';
}

// ========== THREAT HEATMAP ==========
function toggleThreats() {
  threatsEnabled = !threatsEnabled;
  const btn = document.getElementById('threat-toggle');
  btn.style.background = threatsEnabled ? 'var(--gold)' : '';
  btn.style.color = threatsEnabled ? '#000' : '';
  updateThreatOverlay();
}

function updateThreatOverlay() {
  if (!G || !G.territories) return;
  G.territories.forEach(t => {
    const highlightEl = document.getElementById('highlight-' + t.id);
    if (!highlightEl) return;
    if (!threatsEnabled || t.owner !== 0) {
      // Clear threat outline
      if (!selectedSource || selectedSource !== t.id) {
        highlightEl.setAttribute('stroke', 'none');
        highlightEl.setAttribute('stroke-width', '0');
      }
      return;
    }
    // Calculate threat level — only change the OUTLINE, keep territory fill unchanged
    let myArmies = t.armies || 0;
    let enemyAdjacentArmies = 0;
    let hasEnemyAdj = false;
    if (t.adjacent) {
      t.adjacent.forEach(adjId => {
        const adj = terr(adjId);
        if (adj && adj.owner === 1) {
          enemyAdjacentArmies += adj.armies || 0;
          hasEnemyAdj = true;
        }
      });
    }
    if (!hasEnemyAdj) {
      // Interior territory — no threat outline
      highlightEl.setAttribute('stroke', 'none');
      highlightEl.setAttribute('stroke-width', '0');
    } else {
      const ratio = myArmies / Math.max(1, enemyAdjacentArmies);
      let color;
      if (ratio >= 1.5) color = '#22c55e';      // safe green
      else if (ratio >= 1) color = '#84cc16';    // cautious
      else if (ratio >= 0.5) color = '#f59e0b';  // warning orange
      else color = '#ef4444';                     // danger red
      highlightEl.setAttribute('stroke', color);
      highlightEl.setAttribute('stroke-width', '3');
    }
  });
}

// ========== DIFFICULTY ==========
async function setDifficulty(level) {
  await api('POST', '/api/difficulty', {level: level});
}

// ========== TEMPLATE SELECTION ==========
function showTemplateModal() {
  document.getElementById('template-modal').classList.add('show');
}

function hideTemplateModal() {
  document.getElementById('template-modal').classList.remove('show');
}

async function selectTemplate(tmpl) {
  hideTemplateModal();
  selectedTemplate = tmpl;
  playSound('tick');
  const res = await api('POST', '/api/new', {template: tmpl});
  if (res) await fetchState();
}

// ========== WIN PROBABILITY ==========
function updateWinProbBar() {
  const bar = document.getElementById('win-prob-bar');
  // Only show win probability after the game ends (post-game review).
  if (!G || !G.win_probability || G.phase !== 'finished') {
    bar.style.display = 'none';
    return;
  }
  bar.style.display = 'block';
  const p0 = G.win_probability.player_0 || 0.5;
  const p1 = G.win_probability.player_1 || 0.5;
  const pct = Math.round(p0 * 100);
  document.getElementById('win-prob-blue').style.width = pct + '%';
  const leftText = document.getElementById('win-prob-text-left');
  const rightText = document.getElementById('win-prob-text-right');
  if (pct >= 50) {
    leftText.textContent = pct + '%';
    rightText.textContent = '';
  } else {
    leftText.textContent = '';
    rightText.textContent = (100 - pct) + '%';
  }
  // Store for sparkline
  winProbHistory.push(p0);
}

// ========== API ==========
async function api(method, path, body) {
  try {
    const opts = {method, headers:{'Content-Type':'application/json'}};
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(path, opts);
    const j = await r.json();
    if (!r.ok || j.success === false) {
      toast(j.message || 'Request failed', 'error');
      return null;
    }
    return j;
  } catch(e) {
    toast('Network error: ' + e.message, 'error');
    return null;
  }
}

async function fetchState() {
  const s = await api('GET', '/api/game');
  if (s) { G = s; onStateUpdate(); }
}

// ========== TOAST ==========
function toast(msg, type='') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 2500);
}

// ========== FLASH ==========
function flash(text, duration=800) {
  return new Promise(resolve => {
    const el = document.getElementById('phase-flash');
    document.getElementById('flash-text').textContent = text;
    el.classList.add('show');
    setTimeout(() => { el.classList.remove('show'); setTimeout(resolve, 200); }, duration);
  });
}

// ========== MAP RENDERING ==========
function buildMap() {
  const svg = document.getElementById('map-svg');
  svg.innerHTML = '';
  svg.setAttribute('viewBox', '0 0 1000 680');

  // Defs
  const defs = svgEl('defs');
  const marker = svgEl('marker', {id:'arrowhead',markerWidth:8,markerHeight:6,refX:8,refY:3,orient:'auto'});
  const poly = svgEl('polygon', {points:'0 0, 8 3, 0 6', fill:'var(--gold)'});
  marker.appendChild(poly);
  defs.appendChild(marker);
  // Red arrowhead for attack animations
  const markerRed = svgEl('marker', {id:'arrowhead-red',markerWidth:8,markerHeight:6,refX:8,refY:3,orient:'auto'});
  markerRed.appendChild(svgEl('polygon', {points:'0 0, 8 3, 0 6', fill:'#ef4444'}));
  defs.appendChild(markerRed);
  // Blue arrowhead for transfer animations
  const markerBlue = svgEl('marker', {id:'arrowhead-blue',markerWidth:8,markerHeight:6,refX:8,refY:3,orient:'auto'});
  markerBlue.appendChild(svgEl('polygon', {points:'0 0, 8 3, 0 6', fill:'#60a5fa'}));
  defs.appendChild(markerBlue);

  // Ocean background gradient
  const oceanGrad = svgEl('radialGradient', {id:'ocean-bg', cx:'50%', cy:'45%', r:'65%', fx:'50%', fy:'40%'});
  oceanGrad.appendChild(svgEl('stop', {offset:'0%', 'stop-color':'#0f2238'}));
  oceanGrad.appendChild(svgEl('stop', {offset:'40%', 'stop-color':'#0a1628'}));
  oceanGrad.appendChild(svgEl('stop', {offset:'100%', 'stop-color':'#060d15'}));
  defs.appendChild(oceanGrad);

  // Territory fill gradients — player (blue)
  const playerGrad = svgEl('linearGradient', {id:'grad-player', x1:'0', y1:'0', x2:'0', y2:'1'});
  playerGrad.appendChild(svgEl('stop', {offset:'0%', 'stop-color':'#3b82f6'}));
  playerGrad.appendChild(svgEl('stop', {offset:'100%', 'stop-color':'#1d4ed8'}));
  defs.appendChild(playerGrad);

  // Territory fill gradients — enemy (red)
  const enemyGrad = svgEl('linearGradient', {id:'grad-enemy', x1:'0', y1:'0', x2:'0', y2:'1'});
  enemyGrad.appendChild(svgEl('stop', {offset:'0%', 'stop-color':'#ef4444'}));
  enemyGrad.appendChild(svgEl('stop', {offset:'100%', 'stop-color':'#b91c1c'}));
  defs.appendChild(enemyGrad);

  // Territory fill gradients — neutral (gray)
  const neutralGrad = svgEl('linearGradient', {id:'grad-neutral', x1:'0', y1:'0', x2:'0', y2:'1'});
  neutralGrad.appendChild(svgEl('stop', {offset:'0%', 'stop-color':'#6b7280'}));
  neutralGrad.appendChild(svgEl('stop', {offset:'100%', 'stop-color':'#374151'}));
  defs.appendChild(neutralGrad);

  // Territory fill gradients — fog
  const fogGrad = svgEl('linearGradient', {id:'grad-fog', x1:'0', y1:'0', x2:'0', y2:'1'});
  fogGrad.appendChild(svgEl('stop', {offset:'0%', 'stop-color':'#283040'}));
  fogGrad.appendChild(svgEl('stop', {offset:'100%', 'stop-color':'#1a2030'}));
  defs.appendChild(fogGrad);

  // Army bubble gradient
  const armyBubbleGrad = svgEl('radialGradient', {id:'army-bubble-grad', cx:'40%', cy:'35%', r:'65%'});
  armyBubbleGrad.appendChild(svgEl('stop', {offset:'0%', 'stop-color':'rgba(40,40,50,0.85)'}));
  armyBubbleGrad.appendChild(svgEl('stop', {offset:'100%', 'stop-color':'rgba(10,10,15,0.9)'}));
  defs.appendChild(armyBubbleGrad);

  // Drop shadow filter for territories
  const shadowFilter = svgEl('filter', {id:'territory-shadow', x:'-10%', y:'-10%', width:'120%', height:'120%'});
  const feDropShadow = svgEl('feDropShadow', {dx:'0', dy:'1', 'stdDeviation':'1.5', 'flood-color':'rgba(0,0,0,0.4)', 'flood-opacity':'0.4'});
  shadowFilter.appendChild(feDropShadow);
  defs.appendChild(shadowFilter);

  svg.appendChild(defs);

  // Ocean background rect
  svg.appendChild(svgEl('rect', {x:'0', y:'0', width:'1000', height:'680', fill:'url(#ocean-bg)'}));

  // Subtle wave decorations between continents
  const waveGroup = svgEl('g', {id:'ocean-waves', opacity:'0.12'});
  const wavePaths = [
    'M 180,350 Q 210,340 240,355 Q 270,370 300,355',
    'M 320,300 Q 345,290 370,305 Q 395,318 420,305',
    'M 550,420 Q 590,408 630,425 Q 670,440 710,420',
    'M 700,280 Q 730,268 760,283 Q 790,298 820,280',
    'M 100,480 Q 140,468 180,485 Q 210,498 250,480'
  ];
  wavePaths.forEach(function(d) {
    waveGroup.appendChild(svgEl('path', {
      d: d, fill:'none', stroke:'#1e3a5f', 'stroke-width':'1.2',
      'stroke-linecap':'round', opacity:'0.7'
    }));
  });
  svg.appendChild(waveGroup);

  // Check if any territory lacks path data (circle-mode map)
  const isCircleMap = G && G.territories && G.territories.some(t => !t.path);

  // Connection lines between adjacent territories (for circle-mode maps)
  if (isCircleMap && G && G.territories) {
    const connGroup = svgEl('g', {id:'connection-lines'});
    const drawn = new Set();
    G.territories.forEach(t => {
      const x1 = t.label_x || 0;
      const y1 = t.label_y || 0;
      if (t.adjacent) {
        t.adjacent.forEach(adjId => {
          const key = Math.min(t.id, adjId) + '-' + Math.max(t.id, adjId);
          if (drawn.has(key)) return;
          drawn.add(key);
          const adj = G.territories.find(tt => tt.id === adjId);
          if (!adj) return;
          const x2 = adj.label_x || 0;
          const y2 = adj.label_y || 0;
          // Wrap-around connections that span most of the map get dashed style
          const dx = Math.abs(x2 - x1);
          if (dx > 500) {
            connGroup.appendChild(svgEl('line', {
              x1:x1, y1:y1, x2:x2, y2:y2,
              class:'connection-line',
              'stroke-dasharray': '4,4',
              opacity: '0.2'
            }));
          } else {
            connGroup.appendChild(svgEl('line', {
              x1:x1, y1:y1, x2:x2, y2:y2,
              class:'connection-line'
            }));
          }
        });
      }
    });
    svg.appendChild(connGroup);
  }

  // Territory groups
  const terrGroup = svgEl('g', {id:'territories'});
  if (G && G.territories) {
    G.territories.forEach(t => {
      const x = t.label_x || 0;
      const y = t.label_y || 0;
      const g = svgEl('g', {class:'territory-group','data-id':t.id});

      // Bonus tint layer (rendered under the territory for subtle coloring)
      if (t.path && G && G.bonuses) {
        const tBonus = G.bonuses.find(b => (b.territory_ids || b.territories || []).includes(t.id));
        if (tBonus) {
          const bColor = BONUS_COLORS[tBonus.id % BONUS_COLORS.length];
          g.appendChild(svgEl('path', {
            d: t.path,
            class: 'bonus-tint',
            id: 'bonus-tint-' + t.id,
            fill: bColor,
            stroke: 'none'
          }));
        }
      }

      // Territory shape path
      if (t.path) {
        g.appendChild(svgEl('path', {
          d: t.path,
          class: 'territory-path',
          id: 'terr-' + t.id,
          fill: 'url(#grad-fog)',
          stroke: '#080c12',
          'stroke-width': 2,
          'stroke-linejoin': 'round',
          filter: 'url(#territory-shadow)'
        }));
      } else {
        // Fallback circle if no path data
        g.appendChild(svgEl('circle', {cx:x, cy:y, r:18, class:'territory-path', id:'terr-'+t.id, fill:'url(#grad-fog)', stroke:'#080c12','stroke-width':2, filter:'url(#territory-shadow)'}));
      }

      // Selection highlight (invisible path copy on top)
      if (t.path) {
        g.appendChild(svgEl('path', {
          d: t.path,
          class: 'territory-highlight',
          id: 'highlight-' + t.id,
          fill: 'none',
          stroke: 'none',
          'stroke-width': 3,
          'pointer-events': 'none'
        }));
      } else {
        // Highlight circle for non-path territories
        g.appendChild(svgEl('circle', {
          cx:x, cy:y, r:20,
          class: 'territory-highlight',
          id: 'highlight-' + t.id,
          fill: 'none',
          stroke: 'none',
          'stroke-width': 3,
          'pointer-events': 'none'
        }));
      }

      // Army count background circle with gradient and colored border
      g.appendChild(svgEl('circle', {cx:x, cy:y, r:12, id:'army-bg-'+t.id, fill:'url(#army-bubble-grad)', stroke:'rgba(255,255,255,0.15)', 'stroke-width':'1.5', style:'display:none', 'pointer-events':'none'}));
      // Army text
      g.appendChild(svgEl('text', {x:x, y:y, class:'army-text', id:'army-'+t.id}, ''));
      // Deploy badge
      g.appendChild(svgEl('text', {x:x+14, y:y-14, class:'deploy-badge', id:'deploy-badge-'+t.id}, ''));

      g.addEventListener('click', e => onTerritoryClick(t.id, e));
      g.addEventListener('contextmenu', e => { e.preventDefault(); onTerritoryRightClick(t.id); });
      g.addEventListener('mouseenter', e => showTooltip(t.id, e));
      g.addEventListener('mouseleave', hideTooltip);
      g.addEventListener('mousemove', e => moveTooltip(e));

      terrGroup.appendChild(g);
    });
  }
  svg.appendChild(terrGroup);

  // Order lines group — AFTER territories so arrows render on top
  svg.appendChild(svgEl('g', {id:'order-lines'}));

  // Compute true centroids from rendered paths using getBBox()
  // This runs after paths are in the DOM so getBBox() works correctly
  if (G && G.territories) {
    G.territories.forEach(t => {
      const pathEl = document.getElementById('terr-' + t.id);
      if (pathEl && pathEl.tagName === 'path') {
        try {
          const bbox = pathEl.getBBox();
          const cx = bbox.x + bbox.width / 2;
          const cy = bbox.y + bbox.height / 2;
          POS[t.id] = [cx, cy];

          // Reposition army elements to centroid
          const bg = document.getElementById('army-bg-' + t.id);
          const army = document.getElementById('army-' + t.id);
          const badge = document.getElementById('deploy-badge-' + t.id);
          if (bg) { bg.setAttribute('cx', cx); bg.setAttribute('cy', cy); }
          if (army) { army.setAttribute('x', cx); army.setAttribute('y', cy); }
          if (badge) { badge.setAttribute('x', cx + 14); badge.setAttribute('y', cy - 14); }
        } catch(e) {
          POS[t.id] = [t.label_x || 0, t.label_y || 0];
        }
      } else {
        POS[t.id] = [t.label_x || 0, t.label_y || 0];
      }
    });
  }

  // Bonus labels on map
  // For maps with 6 bonuses, use hardcoded positions; otherwise compute from territory centroids
  const defaultBonusPositions = {
    0: [60,  140],   // North America
    1: [195, 580],   // South America
    2: [350, 155],   // Europe
    3: [410, 560],   // Africa
    4: [910, 125],   // Asia
    5: [860, 540],   // Oceania
  };
  const bonusPositions = {};
  if (G && G.bonuses) {
    const hasManyBonuses = G.bonuses.length > 6;
    G.bonuses.forEach(b => {
      if (!hasManyBonuses && defaultBonusPositions[b.id]) {
        bonusPositions[b.id] = defaultBonusPositions[b.id];
      } else {
        // Compute position from territory centroids — place label above-left of the bonus region
        let minX = Infinity, minY = Infinity;
        b.territory_ids.forEach(tid => {
          const p = POS[tid];
          if (p) { minX = Math.min(minX, p[0]); minY = Math.min(minY, p[1]); }
        });
        if (minX < Infinity) {
          bonusPositions[b.id] = [minX - 10, minY - 18];
        }
      }
    });
  }
  const bonusGroup = svgEl('g', {id:'bonus-labels', opacity:'0.75'});
  if (G && G.bonuses) {
    G.bonuses.forEach(b => {
      const pos = bonusPositions[b.id];
      if (!pos) return;
      const g = svgEl('g', {id:'bonus-label-'+b.id, 'pointer-events':'none'});
      const color = BONUS_COLORS[b.id % BONUS_COLORS.length];

      // Compact single-line label
      g.appendChild(svgEl('text', {
        x: pos[0], y: pos[1],
        'text-anchor':'start', 'font-size':'9px', 'font-weight':'700',
        fill: color, id: 'bonus-name-'+b.id
      }, b.name));
      g.appendChild(svgEl('text', {
        x: pos[0], y: pos[1]+11,
        'text-anchor':'start', 'font-size':'8px', 'font-weight':'600',
        fill: '#aaa', id: 'bonus-prog-'+b.id
      }, ''));
      bonusGroup.appendChild(g);
    });
  }
  svg.appendChild(bonusGroup);

  // Animation group (arrows, combat text)
  svg.appendChild(svgEl('g', {id:'anim-layer'}));

  // Float animation group
  svg.appendChild(svgEl('g', {id:'floats'}));
}

function svgEl(tag, attrs, text) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
  if (text !== undefined) el.textContent = text;
  return el;
}

function updateMap() {
  if (!G) return;
  G.territories.forEach(t => {
    const pathEl = document.getElementById('terr-' + t.id);
    const highlightEl = document.getElementById('highlight-' + t.id);
    const armyEl = document.getElementById('army-' + t.id);
    const armyBg = document.getElementById('army-bg-' + t.id);
    const badgeEl = document.getElementById('deploy-badge-' + t.id);

    if (!pathEl) return;

    // Color — use gradients for a 3D landmass feel
    let fill = 'url(#grad-fog)';
    let strokeColor = '#080c12';
    let ownerBorderColor = 'rgba(255,255,255,0.15)';
    if (t.visible !== false) {
      if (t.owner === 0) { fill = 'url(#grad-player)'; strokeColor = '#152a5e'; ownerBorderColor = 'rgba(96,165,250,0.6)'; }
      else if (t.owner === 1) { fill = 'url(#grad-enemy)'; strokeColor = '#5a1010'; ownerBorderColor = 'rgba(239,68,68,0.6)'; }
      else { fill = 'url(#grad-neutral)'; strokeColor = '#1a1f2a'; ownerBorderColor = 'rgba(255,255,255,0.15)'; }
    }
    pathEl.setAttribute('fill', fill);
    pathEl.setAttribute('stroke', strokeColor);

    // Update army bubble border color to match owner
    if (armyBg) {
      armyBg.setAttribute('stroke', ownerBorderColor);
    }

    // Highlight for selection/pick state
    if (highlightEl) {
      highlightEl.classList.remove('selected-highlight');
      if (selectedSource === t.id) {
        highlightEl.setAttribute('stroke', 'var(--gold)');
        highlightEl.setAttribute('stroke-width', '4');
        highlightEl.classList.add('selected-highlight');
      } else if (phase === 'picking' && picks.includes(t.id)) {
        highlightEl.setAttribute('stroke', 'var(--green)');
        highlightEl.setAttribute('stroke-width', '3');
      } else if (phase === 'picking' && G.pick_options && G.pick_options.includes(t.id)) {
        highlightEl.setAttribute('stroke', 'var(--gold)');
        highlightEl.setAttribute('stroke-width', '2');
        highlightEl.setAttribute('stroke-dasharray', '6,3');
      } else {
        highlightEl.setAttribute('stroke', 'none');
        highlightEl.setAttribute('stroke-dasharray', 'none');
      }
    }

    // Armies
    let displayArmies = t.armies || 0;
    const dep = deploys[t.id] || 0;
    if (dep > 0) displayArmies += dep;

    if (t.visible !== false && displayArmies > 0) {
      armyEl.textContent = displayArmies;
      // Larger font and bigger bubble for armies > 10
      if (displayArmies > 10) {
        armyEl.classList.add('large-army');
        if (armyBg) armyBg.setAttribute('r', '14');
      } else {
        armyEl.classList.remove('large-army');
        if (armyBg) armyBg.setAttribute('r', '12');
      }
      if (armyBg) armyBg.style.display = '';
    } else {
      armyEl.textContent = '';
      armyEl.classList.remove('large-army');
      if (armyBg) armyBg.style.display = 'none';
    }

    // Deploy badge
    if (dep > 0) {
      badgeEl.textContent = '+' + dep;
    } else {
      badgeEl.textContent = '';
    }
  });

  // Update bonus labels
  if (G.bonuses) {
    G.bonuses.forEach(b => {
      const progEl = document.getElementById('bonus-prog-' + b.id);
      if (progEl) {
        const complete = b.player_count === b.total;
        progEl.textContent = complete ? '\u2713 +' + b.value + '/turn' : b.player_count + '/' + b.total + ' (+' + b.value + ')';
        progEl.setAttribute('fill', complete ? '#4ade80' : '#fff');
      }
    });
  }

  // Draw pick rank numbers on the map during picking phase
  let existingRanks = document.getElementById('pick-ranks');
  if (existingRanks) existingRanks.remove();
  if (phase === 'picking' && picks.length > 0) {
    const rankGroup = svgEl('g', {id:'pick-ranks'});
    picks.forEach(function(id, idx) {
      const pos = POS[id];
      if (!pos) return;
      // Gold ring around picked territory
      rankGroup.appendChild(svgEl('circle', {
        cx: pos[0], cy: pos[1], r: 22,
        class: 'pick-ring'
      }));
      // Large rank number
      rankGroup.appendChild(svgEl('text', {
        x: pos[0], y: pos[1],
        class: 'pick-rank'
      }, '' + (idx + 1)));
    });
    const mapSvg = document.getElementById('map-svg');
    if (mapSvg) mapSvg.appendChild(rankGroup);
  }

  // Apply threat overlay if enabled
  if (threatsEnabled) updateThreatOverlay();

  drawOrderLines();
}

function drawOrderLines() {
  const g = document.getElementById('order-lines');
  if (!g) return;
  g.innerHTML = '';

  // Draw queued order arrows with army counts
  orders.forEach(o => {
    if (o.from === undefined || o.to === undefined || !POS[o.from] || !POS[o.to]) return;
    const [x1,y1] = POS[o.from];
    const [x2,y2] = POS[o.to];
    const isAttack = o.type === 'attack';
    const color = isAttack ? '#ef4444' : '#60a5fa';

    // Arrow line
    g.appendChild(svgEl('line', {
      x1, y1, x2, y2,
      stroke: color, 'stroke-width': 2.5, 'stroke-dasharray': '8,4',
      'marker-end': 'url(#arrowhead)', opacity: 0.85
    }));

    // Army count label at midpoint
    const mx = (x1+x2)/2, my = (y1+y2)/2;
    g.appendChild(svgEl('circle', {cx:mx, cy:my, r:9, fill:'rgba(0,0,0,0.7)', stroke:color, 'stroke-width':1.5}));
    g.appendChild(svgEl('text', {
      x:mx, y:my, 'text-anchor':'middle', 'dominant-baseline':'central',
      'font-size':'9px', 'font-weight':'700', fill:'#fff', 'pointer-events':'none'
    }, o.armies));
  });

  // When a source is selected, show guide lines to valid adjacent targets
  if (selectedSource !== null && POS[selectedSource]) {
    const t = terr(selectedSource);
    if (t) {
      t.adjacent.forEach(adj => {
        if (!POS[adj]) return;
        const at = terr(adj);
        if (!at) return;
        const isEnemy = at.owner !== 0;
        const color = isEnemy ? 'rgba(239,68,68,0.25)' : 'rgba(96,165,250,0.2)';
        g.appendChild(svgEl('line', {
          x1: POS[selectedSource][0], y1: POS[selectedSource][1],
          x2: POS[adj][0], y2: POS[adj][1],
          stroke: color, 'stroke-width': 2, 'stroke-dasharray': '4,4', fill: 'none'
        }));
      });
    }
  }
}

function floatText(territoryId, text, color) {
  const fg = document.getElementById('floats');
  if (!fg || !POS[territoryId]) return;
  const [x, y] = POS[territoryId];
  const el = svgEl('text', {x:x, y:y-20, class:'plus-one'}, text);
  if (color) el.setAttribute('fill', color);
  fg.appendChild(el);
  setTimeout(() => el.remove(), 700);
}

function showTooltip(id, e) {
  const t = terr(id);
  if (!t) return;
  const tip = document.getElementById('tooltip');
  let owner = t.owner === 0 ? 'You' : t.owner === 1 ? 'AI' : 'Neutral';
  let ownerColor = t.owner === 0 ? 'var(--blue)' : t.owner === 1 ? 'var(--red)' : 'var(--neutral)';

  let html = '<div class="tip-name">' + t.name + '</div>';
  html += '<div>Owner: <span style="color:' + ownerColor + '">' + owner + '</span></div>';
  html += '<div>Armies: <strong>' + (t.armies || 0) + '</strong></div>';

  // Find bonus info
  if (G && G.bonuses) {
    const tBonus = G.bonuses.find(b => b.territories && b.territories.includes(t.id));
    if (tBonus) {
      const bColor = BONUS_COLORS[tBonus.id % BONUS_COLORS.length];
      html += '<div class="tip-bonus"><span class="bonus-dot" style="background:' + bColor + '"></span>' + tBonus.name + ' (+' + tBonus.value + ')</div>';
    }
  }

  // Deploy hint
  if (phase === 'orders' && t.owner === 0 && deployLeft > 0) {
    html += '<div class="tip-hint">Click to deploy (+1, Shift+5)</div>';
  }

  tip.innerHTML = html;
  tip.classList.add('show');
  const rect = document.getElementById('map-container').getBoundingClientRect();
  tip.style.left = (e.clientX - rect.left + 12) + 'px';
  tip.style.top = (e.clientY - rect.top - 30) + 'px';
}
function moveTooltip(e) {
  const tip = document.getElementById('tooltip');
  if (!tip.classList.contains('show')) return;
  const rect = document.getElementById('map-container').getBoundingClientRect();
  tip.style.left = (e.clientX - rect.left + 12) + 'px';
  tip.style.top = (e.clientY - rect.top - 30) + 'px';
}
function hideTooltip() {
  document.getElementById('tooltip').classList.remove('show');
}

// ========== TERRITORY HELPERS ==========
function terr(id) { return G ? G.territories.find(t => t.id === id) : null; }
function bonus(id) { return G ? G.bonuses.find(b => b.id === id) : null; }
function isOwned(id) { const t = terr(id); return t && t.owner === 0; }
function isEnemy(id) { const t = terr(id); return t && (t.owner === 1 || t.owner === 255); }
function availableArmies(id) {
  const t = terr(id);
  if (!t) return 0;
  let a = t.armies + (deploys[id] || 0);
  orders.forEach(o => { if (o.from === id) a -= o.armies; });
  return Math.max(0, a - 1); // Must leave 1
}

// ========== STATE UPDATE ==========
function onStateUpdate() {
  if (!G) return;

  // Top bar
  document.getElementById('turn-num').textContent = G.turn || 1;
  document.getElementById('income-num').textContent = G.income || 0;
  document.getElementById('my-terr').textContent = G.my_territories || 0;
  document.getElementById('enemy-terr').textContent = (G.phase === 'finished') ? (G.enemy_territories || 0) : '?';

  // Determine phase
  if (G.phase === 'finished') {
    phase = 'finished';
  } else if (G.phase === 'picking') {
    phase = 'picking';
    picks = [];
  } else if (G.phase === 'play') {
    // Reset state on new turn or first entry
    const currentTurn = G.turn || 1;
    if (phase !== 'orders' || !window._lastTurn || window._lastTurn !== currentTurn) {
      window._lastTurn = currentTurn;
      phase = 'orders';
      deploys = {};
      deployLeft = G.income || 5;
      orders = [];
      selectedSource = null;
      pendingTarget = null;
      gameStats.turnsPlayed = currentTurn;
    }
  }

  // Win probability
  updateWinProbBar();

  buildMap();
  updateMap();
  renderSidebar();
  renderHistory();

  // Game over
  if (G.phase === 'finished' && G.winner !== null && G.winner !== undefined) {
    showGameOver(G.winner);
  }
}

// ========== SIDEBAR ==========
function renderSidebar() {
  const pp = document.getElementById('phase-panel');
  const cp = document.getElementById('control-panel');

  if (phase === 'picking') {
    renderPickingPanel(pp, cp);
  } else if (phase === 'orders') {
    renderOrdersPanel(pp, cp);
  } else {
    pp.innerHTML = '<div class="sb-phase">Waiting...</div>';
    cp.innerHTML = '';
  }
}

function renderPickingPanel(pp, cp) {
  const needed = G.picks_needed || 4;
  const totalOptions = (G.pick_options || []).length;
  pp.innerHTML = '<div class="sb-phase">Picking Phase</div>' +
    '<div class="sb-sub">Rank all territories by priority (you\'ll receive ' + needed + ')</div>' +
    '<div style="margin-top:8px;font-size:13px;color:var(--gold)">' + picks.length + ' / ' + totalOptions + ' ranked</div>' +
    '<div style="margin-top:8px" id="pick-list-container">' +
      picks.map(function(id, idx) {
        var t = terr(id);
        return '<div class="order-item" draggable="true" data-pick-idx="' + idx + '" ondragstart="pickDragStart(event,' + idx + ')" ondragover="pickDragOver(event)" ondrop="pickDrop(event,' + idx + ')" style="cursor:grab">' +
          '<span style="color:var(--gold);font-weight:900;font-size:16px;margin-right:8px;min-width:24px;text-align:center">' + (idx+1) + '</span>' +
          '<span style="flex:1">' + (t ? t.name : id) + '</span>' +
          '<button class="remove-btn" onclick="movePickUp(' + idx + ')" title="Move up" style="color:var(--text2)"' + (idx===0?' disabled':'') + '>\u25B2</button>' +
          '<button class="remove-btn" onclick="movePickDown(' + idx + ')" title="Move down" style="color:var(--text2)"' + (idx===picks.length-1?' disabled':'') + '>\u25BC</button>' +
          '<button class="remove-btn" onclick="unpick(' + id + ')" title="Remove">\u2715</button>' +
        '</div>';
      }).join('') +
    '</div>';
  cp.innerHTML = '<button class="btn btn-gold" ' + (picks.length < totalOptions ? 'disabled' : '') + ' onclick="confirmPicks()">Confirm Picks</button>';
}

function renderOrdersPanel(pp, cp) {
  // Phase header with deploy counter
  let subText = '';
  if (selectedSource !== null) {
    subText = 'Click adjacent territory to attack/transfer from ' + ((terr(selectedSource)||{}).name||'');
  } else if (deployLeft > 0) {
    subText = 'Click your territories to deploy, or select a source to attack';
  } else {
    subText = 'Click your territory, then click target to attack/transfer';
  }

  let headerHtml = '<div class="sb-phase">Orders</div>' +
    '<div class="sb-sub">' + subText + '</div>';

  if (deployLeft > 0) {
    headerHtml += '<div class="deploy-counter">' + deployLeft + '</div>' +
      '<div class="deploy-hint">' + deployLeft + ' armies to deploy &mdash; Click +1 | Shift +5 | Right-click -1</div>';
  }

  pp.innerHTML = headerHtml;

  let html = '';

  // Editing army count for an existing order
  if (typeof editingOrderIdx === 'number' && editingOrderIdx >= 0 && editingOrderIdx < orders.length) {
    const eo = orders[editingOrderIdx];
    const srcT = terr(eo.from);
    const tgtT = terr(eo.to);
    const label = eo.type === 'attack' ? 'Attack' : 'Move';
    // Calculate max armies available for this order (give back its current armies first)
    const editMax = availableArmies(eo.from) + eo.armies;
    html += '<div style="font-size:12px;margin-bottom:4px;color:var(--text2)">Edit ' + label + ': ' + (srcT?srcT.name:'?') + ' \u2192 ' + (tgtT?tgtT.name:'?') + '</div>' +
      '<div class="army-selector">' +
        '<button onclick="adjustEditOrder(-1)">-</button>' +
        '<span class="army-count">' + eo.armies + '</span>' +
        '<button onclick="adjustEditOrder(1)">+</button>' +
        '<button class="cancel-order" onclick="cancelEditOrder()">Done</button>' +
      '</div>';
  }

  // Unified order list: deploys + attacks/transfers in creation order
  html += '<h3 style="margin-top:8px">Orders</h3>';

  const deployEntries = Object.entries(deploys).filter(function(kv) { return kv[1] > 0; });
  const hasAnyOrders = deployEntries.length > 0 || orders.length > 0;

  if (!hasAnyOrders) {
    html += '<div style="font-size:12px;color:var(--text3)">No orders yet</div>';
  } else {
    // Show deploy orders first
    deployEntries.forEach(function(kv) {
      var id = kv[0], count = kv[1];
      var t = terr(parseInt(id));
      html += '<div class="order-item"><span>\u2795 Deploy +' + count + ' to ' + (t?t.name:id) + '</span><button class="remove-btn" onclick="removeDeploy(' + id + ')">\u2715</button></div>';
    });
    // Then attack/transfer orders
    orders.forEach(function(o, i) {
      var icon = o.type === 'attack' ? '\u2694' : '\u2192';
      var fromT = terr(o.from);
      var toT = terr(o.to);
      html += '<div class="order-item"><span>' + icon + ' ' + (fromT?fromT.name:o.from) + ' \u2192 ' + (toT?toT.name:o.to) + ' (' + o.armies + ')</span><button class="remove-btn" onclick="editOrder(' + i + ')" title="Edit armies" style="color:var(--text2)">\u270E</button><button class="remove-btn" onclick="removeOrder(' + i + ')">\u2715</button></div>';
    });
  }

  // Undeployed warning
  if (deployLeft > 0) {
    html += '<div class="undeployed-warning">' + deployLeft + ' armies undeployed</div>';
  }

  html += '<button class="btn btn-green" style="margin-top:12px" onclick="endTurn()">End Turn</button>';
  html += renderBonusInfo();
  cp.innerHTML = html;
}

function renderBonusInfo() {
  if (!G || !G.bonuses) return '';
  let html = '<h3 style="margin-top:12px">Bonuses</h3>';
  G.bonuses.forEach(b => {
    const color = BONUS_COLORS[b.id % BONUS_COLORS.length];
    const complete = b.player_count === b.total;
    html += '<div class="bonus-row ' + (complete?'complete':'') + '"><span class="bonus-dot" style="background:' + color + '"></span>' + b.name + ' (+' + b.value + ') ' + b.player_count + '/' + b.total + '</div>';
  });
  return html;
}

// ========== HISTORY ==========
function renderHistory() {
  const hp = document.getElementById('history-panel');
  if (!G || !G.history || G.history.length === 0) { hp.innerHTML = ''; return; }
  let html = '';
  G.history.slice().reverse().forEach(h => {
    html += '<div class="history-turn">' +
      '<div class="history-header" onclick="this.nextElementSibling.classList.toggle(\'open\')">' +
        'Turn ' + h.turn + ' <span>+</span>' +
      '</div>' +
      '<div class="history-body">' + formatEvents(h.events) + '</div>' +
    '</div>';
  });
  hp.innerHTML = html;
}

function formatEvents(events) {
  if (!events) return '';
  return events.map(e => {
    if (e.Deploy) {
      const p = e.Deploy.player === 0;
      const t = terr(e.Deploy.territory);
      return '<div class="' + (p?'log-player':'log-enemy') + '">' + (p?'You':'AI') + ' deployed ' + e.Deploy.armies + ' to ' + (t?t.name:e.Deploy.territory) + '</div>';
    }
    if (e.Attack) {
      const a = e.Attack;
      const p = a.player === 0;
      const from = terr(a.from);
      const to = terr(a.to);
      const result = a.captured ? 'captured!' : 'failed';
      return '<div class="' + (p?'log-player':'log-enemy') + '">' + (p?'You':'AI') + ' attacked ' + (from?from.name:a.from) + ' -> ' + (to?to.name:a.to) + ' (' + a.armies + 'v' + a.defenders + ') ' + result + '</div>';
    }
    if (e.Transfer) {
      const tr = e.Transfer;
      const p = tr.player === 0;
      const from = terr(tr.from);
      const to = terr(tr.to);
      return '<div class="' + (p?'log-player':'log-enemy') + '">' + (p?'You':'AI') + ' transferred ' + tr.armies + ' from ' + (from?from.name:tr.from) + ' to ' + (to?to.name:tr.to) + '</div>';
    }
    if (e.Capture) {
      const p = e.Capture.player === 0;
      const t = terr(e.Capture.territory);
      return '<div class="' + (p?'log-player':'log-enemy') + '">' + (p?'You':'AI') + ' captured ' + (t?t.name:e.Capture.territory) + '</div>';
    }
    if (e.Eliminated) {
      return '<div class="log-system">Player ' + e.Eliminated.player + ' eliminated!</div>';
    }
    if (e.Victory) {
      const p = e.Victory.player === 0;
      return '<div class="log-system">' + (p?'You win!':'AI wins!') + '</div>';
    }
    return '';
  }).join('');
}

// ========== PICKING ==========
function onPickClick(id) {
  if (picks.includes(id)) {
    picks = picks.filter(p => p !== id);
  } else {
    if (!G.pick_options || !G.pick_options.includes(id)) return;
    if (picks.length >= G.pick_options.length) return;
    picks.push(id);
    playSound('tick');
  }
  updateMap();
  renderSidebar();
}

function movePickUp(idx) {
  if (idx <= 0) return;
  var tmp = picks[idx];
  picks[idx] = picks[idx - 1];
  picks[idx - 1] = tmp;
  updateMap();
  renderSidebar();
}

function movePickDown(idx) {
  if (idx >= picks.length - 1) return;
  var tmp = picks[idx];
  picks[idx] = picks[idx + 1];
  picks[idx + 1] = tmp;
  updateMap();
  renderSidebar();
}

let _pickDragIdx = null;
function pickDragStart(e, idx) {
  _pickDragIdx = idx;
  e.dataTransfer.effectAllowed = 'move';
}
function pickDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}
function pickDrop(e, targetIdx) {
  e.preventDefault();
  if (_pickDragIdx === null || _pickDragIdx === targetIdx) return;
  const item = picks.splice(_pickDragIdx, 1)[0];
  picks.splice(targetIdx, 0, item);
  _pickDragIdx = null;
  updateMap();
  renderSidebar();
}

function unpick(id) {
  picks = picks.filter(p => p !== id);
  updateMap();
  renderSidebar();
}

async function confirmPicks() {
  const res = await api('POST', '/api/picks', {picks: picks});
  if (res) {
    if (res.events) showTurnEvents(res.events);
    await flash('Game begins!');
    // Reset turn tracking so applyState properly initializes deploy phase
    window._lastTurn = null;
    await fetchState();
  }
}

// ========== UNIFIED ORDERS CLICK ==========
function onOrdersClick(id, e) {
  // If the army popup is open (pendingTarget set):
  // - clicking the pending target confirms the order
  // - clicking anything else cancels
  if (pendingTarget !== null) {
    if (id === pendingTarget) {
      popupConfirm();
    } else {
      cancelPending();
    }
    return;
  }

  // Alt-click to remove deploys
  if (e.altKey && isOwned(id)) {
    onDeployRightClick(id);
    return;
  }

  if (selectedSource === null) {
    // No source selected
    if (isOwned(id)) {
      if (deployLeft > 0) {
        // Deploy to this territory
        onDeployClick(id, e);
      } else {
        // Select as source for attack/transfer
        if (availableArmies(id) <= 0) { toast('No armies available', 'error'); return; }
        selectedSource = id;
        playSound('tick');
        updateMap();
        renderSidebar();
      }
    } else {
      // Clicked enemy/neutral with no source
      toast('Select your territory first', 'error');
    }
  } else {
    // Source is selected
    if (selectedSource === id) {
      // Deselect
      selectedSource = null;
      updateMap();
      renderSidebar();
    } else {
      // Attempt to target
      const src = terr(selectedSource);
      if (!src || !src.adjacent.includes(id)) {
        // Not adjacent — if owned, either deploy or select as new source
        if (isOwned(id)) {
          if (deployLeft > 0) {
            selectedSource = null;
            onDeployClick(id, e);
          } else if (availableArmies(id) > 0) {
            selectedSource = id;
            playSound('tick');
          } else {
            selectedSource = null;
          }
        } else {
          selectedSource = null;
        }
        updateMap();
        renderSidebar();
        return;
      }
      // Adjacent target — show army popup on map near target
      const tgt = terr(id);
      if (!tgt) return;

      const max = availableArmies(selectedSource);
      if (max <= 0) { toast('No armies available', 'error'); selectedSource = null; updateMap(); renderSidebar(); return; }

      const orderType = (tgt.owner === 0) ? 'transfer' : 'attack';
      pendingTarget = id;
      pendingType = orderType;
      pendingMax = max;
      pendingArmies = max;
      showMapArmyPopup(id);
      updateMap();
      renderSidebar();
    }
  }
}

// ========== DEPLOY ==========
function onDeployClick(id, e) {
  if (!isOwned(id)) return;
  const amount = e.shiftKey ? 5 : 1;
  const actual = Math.min(amount, deployLeft);
  if (actual <= 0) return;

  if (!deploys[id]) deploys[id] = 0;
  deploys[id] += actual;
  deployLeft -= actual;

  floatText(id, '+' + actual);
  playSound('deploy');
  updateMap();
  renderSidebar();
}

function onDeployRightClick(id) {
  if (!deploys[id] || deploys[id] <= 0) return;
  deploys[id]--;
  deployLeft++;
  if (deploys[id] <= 0) delete deploys[id];
  updateMap();
  renderSidebar();
}

function removeDeploy(id) {
  id = parseInt(id);
  const amount = deploys[id] || 0;
  deployLeft += amount;
  delete deploys[id];
  updateMap();
  renderSidebar();
}

// ========== ATTACK/TRANSFER ==========
function adjustPending(delta) {
  pendingArmies = Math.max(1, Math.min(pendingMax, pendingArmies + delta));
  renderSidebar();
}

function confirmPending() {
  if (pendingTarget === null) return;
  orders.push({
    type: pendingType,
    from: selectedSource,
    to: pendingTarget,
    armies: pendingArmies
  });
  if (pendingType === 'attack') playSound('attack');
  pendingTarget = null;
  selectedSource = null;
  hideMapArmyPopup();
  updateMap();
  renderSidebar();
}

function cancelPending() {
  pendingTarget = null;
  hideMapArmyPopup();
  updateMap();
  renderSidebar();
}

function showMapArmyPopup(territoryId) {
  const popup = document.getElementById('map-army-popup');
  const label = document.getElementById('popup-label');
  const countEl = document.getElementById('popup-count');
  const tgt = terr(territoryId);
  const actionLabel = pendingType === 'attack' ? 'Attack' : 'Move';
  label.textContent = actionLabel + ' ' + (tgt ? tgt.name : territoryId);
  countEl.textContent = pendingArmies;

  // Position near the territory using SVG coordinates
  const svgEl = document.getElementById('map-svg');
  const container = document.getElementById('map-container');
  if (POS[territoryId] && svgEl) {
    const pt = svgEl.createSVGPoint();
    pt.x = POS[territoryId][0];
    pt.y = POS[territoryId][1];
    const ctm = svgEl.getScreenCTM();
    if (ctm) {
      const screenPt = pt.matrixTransform(ctm);
      const containerRect = container.getBoundingClientRect();
      let left = screenPt.x - containerRect.left + 15;
      let top = screenPt.y - containerRect.top - 30;
      // Keep popup on screen
      if (left + 200 > containerRect.width) left = screenPt.x - containerRect.left - 215;
      if (top < 0) top = screenPt.y - containerRect.top + 15;
      popup.style.left = left + 'px';
      popup.style.top = top + 'px';
    }
  }
  popup.style.display = 'block';
}

function hideMapArmyPopup() {
  document.getElementById('map-army-popup').style.display = 'none';
}

function popupAdjust(delta) {
  pendingArmies = Math.max(1, Math.min(pendingMax, pendingArmies + delta));
  document.getElementById('popup-count').textContent = pendingArmies;
}

function popupConfirm() {
  if (pendingTarget === null || selectedSource === null) return;
  orders.push({
    type: pendingType,
    from: selectedSource,
    to: pendingTarget,
    armies: pendingArmies
  });
  if (pendingType === 'attack') playSound('attack');
  else playSound('tick');
  pendingTarget = null;
  selectedSource = null;
  hideMapArmyPopup();
  updateMap();
  renderSidebar();
}

function removeOrder(index) {
  orders.splice(index, 1);
  if (editingOrderIdx === index) editingOrderIdx = null;
  else if (typeof editingOrderIdx === 'number' && editingOrderIdx > index) editingOrderIdx--;
  updateMap();
  renderSidebar();
}

function editOrder(index) {
  editingOrderIdx = index;
  renderSidebar();
}

function adjustEditOrder(delta) {
  if (typeof editingOrderIdx !== 'number' || !orders[editingOrderIdx]) return;
  const o = orders[editingOrderIdx];
  const maxAvail = availableArmies(o.from) + o.armies; // give back current before recalculating
  o.armies = Math.max(1, Math.min(maxAvail, o.armies + delta));
  updateMap();
  renderSidebar();
}

function cancelEditOrder() {
  editingOrderIdx = null;
  renderSidebar();
}

// ========== TURN ANIMATION HELPERS ==========
function animateArrow(fromId, toId, color, duration) {
  const animLayer = document.getElementById('anim-layer');
  if (!animLayer || !POS[fromId] || !POS[toId]) return;
  const [x1,y1] = POS[fromId];
  const [x2,y2] = POS[toId];
  const markerId = color === '#ef4444' ? 'arrowhead-red' : (color === '#60a5fa' ? 'arrowhead-blue' : 'arrowhead');
  const line = svgEl('line', {
    x1, y1, x2, y2,
    stroke: color, 'stroke-width': 4, class: 'anim-arrow',
    'marker-end': 'url(#' + markerId + ')', opacity: '0.9'
  });
  animLayer.appendChild(line);
  setTimeout(function() { line.remove(); }, duration || 500);
}

function showCombatText(territoryId, text, color) {
  const animLayer = document.getElementById('anim-layer');
  if (!animLayer || !POS[territoryId]) return;
  const [x, y] = POS[territoryId];
  const el = svgEl('text', {
    x: x, y: y - 25,
    class: 'combat-text', fill: color || '#fff'
  }, text);
  animLayer.appendChild(el);
  setTimeout(function() { el.remove(); }, 800);
}

function flashTerritory(territoryId, className) {
  const pathEl = document.getElementById('terr-' + territoryId);
  if (!pathEl) return;
  pathEl.classList.remove('flash-deploy', 'flash-capture', 'flash-fail');
  void pathEl.offsetWidth; // force reflow
  pathEl.classList.add(className);
  setTimeout(function() { pathEl.classList.remove(className); }, 600);
}

// ========== END TURN ==========
async function endTurn() {
  if (resolving) return;
  resolving = true;

  // Build API orders
  const apiOrders = [];
  Object.entries(deploys).forEach(([id, count]) => {
    if (count > 0) apiOrders.push({Deploy: {territory: parseInt(id), armies: count}});
  });
  orders.forEach(o => {
    if (o.type === 'attack') {
      apiOrders.push({Attack: {from: o.from, to: o.to, armies: o.armies}});
    } else {
      apiOrders.push({Transfer: {from: o.from, to: o.to, armies: o.armies}});
    }
  });

  const res = await api('POST', '/api/orders', {orders: apiOrders});
  if (res) {
    if (res.events) await showTurnEvents(res.events);
  }

  deploys = {};
  orders = [];
  selectedSource = null;
  pendingTarget = null;
  editingOrderIdx = null;
  window._lastTurn = null; // Force orders re-init on next fetchState
  resolving = false;

  await fetchState();
}

async function showTurnEvents(events) {
  const log = document.getElementById('turn-log');
  log.innerHTML = '<h3 style="padding:0 0 6px">Turn Events</h3>';

  for (const e of events) {
    const div = document.createElement('div');
    div.className = 'log-entry';

    if (e.Deploy) {
      const p = e.Deploy.player === 0;
      const t = terr(e.Deploy.territory);
      div.className += p ? ' log-player' : ' log-enemy';
      div.textContent = (p?'You':'AI') + ' deployed ' + e.Deploy.armies + ' to ' + (t?t.name:e.Deploy.territory);
      // Animation: flash territory green, show +N
      flashTerritory(e.Deploy.territory, 'flash-deploy');
      floatText(e.Deploy.territory, '+' + e.Deploy.armies, p ? '#3fb950' : '#f87171');
      if (p) playSound('deploy');
    } else if (e.Attack) {
      const a = e.Attack;
      const p = a.player === 0;
      const from = terr(a.from);
      const to = terr(a.to);
      const result = a.captured ? 'captured!' : 'repelled';
      div.className += p ? ' log-player' : ' log-enemy';
      div.textContent = (p?'You':'AI') + ' attacked ' + (from?from.name:a.from) + ' -> ' + (to?to.name:a.to) + ' (' + a.armies + 'v' + a.defenders + ') ' + result;
      // Animation: draw attack arrow, show combat text
      animateArrow(a.from, a.to, '#ef4444', 600);
      const combatSymbol = a.captured ? '\u2713' : '\u2717';
      showCombatText(a.to, a.armies + 'v' + a.defenders + ' ' + combatSymbol, a.captured ? '#4ade80' : '#f87171');
      if (a.captured) {
        // Immediately update territory color to attacker's color
        const capturedEl = document.getElementById('terr-' + a.to);
        if (capturedEl) capturedEl.setAttribute('fill', p ? 'url(#grad-player)' : 'url(#grad-enemy)');
        flashTerritory(a.to, 'flash-capture');
        playSound('capture');
        if (p) gameStats.captured++;
        else gameStats.lost++;
      } else {
        flashTerritory(a.to, 'flash-fail');
      }
      playSound('attack');
    } else if (e.Transfer) {
      const tr = e.Transfer;
      const p = tr.player === 0;
      const from = terr(tr.from);
      const to = terr(tr.to);
      div.className += p ? ' log-player' : ' log-enemy';
      div.textContent = (p?'You':'AI') + ' transferred ' + tr.armies + ': ' + (from?from.name:tr.from) + ' -> ' + (to?to.name:tr.to);
      // Animation: blue arrow
      animateArrow(tr.from, tr.to, '#60a5fa', 400);
    } else if (e.Capture) {
      const p = e.Capture.player === 0;
      const t = terr(e.Capture.territory);
      div.className += p ? ' log-player' : ' log-enemy';
      div.textContent = (p?'You':'AI') + ' captured ' + (t?t.name:e.Capture.territory);
      // Immediately update territory color to capturer's color
      const capEl = document.getElementById('terr-' + e.Capture.territory);
      if (capEl) capEl.setAttribute('fill', p ? 'url(#grad-player)' : 'url(#grad-enemy)');
      flashTerritory(e.Capture.territory, 'flash-capture');
    } else if (e.Eliminated) {
      div.className += ' log-system';
      div.textContent = 'Player ' + e.Eliminated.player + ' eliminated!';
    } else if (e.Victory) {
      div.className += ' log-system';
      div.textContent = e.Victory.player === 0 ? 'Victory!' : 'Defeat!';
    }

    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    await sleep(300);
  }
}

// ========== GAME OVER ==========
function showGameOver(winner) {
  const el = document.getElementById('game-over');
  const title = document.getElementById('go-title');
  const msg = document.getElementById('go-msg');
  const statsDiv = document.getElementById('go-stats');
  if (winner === 0) {
    title.textContent = 'Victory!';
    title.style.color = 'var(--green)';
    msg.textContent = 'You conquered the world!';
    playSound('win');
  } else {
    title.textContent = 'Defeat';
    title.style.color = 'var(--red)';
    msg.textContent = 'The AI has conquered the world.';
    playSound('lose');
  }

  // Build post-game stats
  let statsHtml = '<div class="stats-grid">' +
    '<div class="stat-item"><div class="stat-label">Turns Played</div><div class="stat-value">' + gameStats.turnsPlayed + '</div></div>' +
    '<div class="stat-item"><div class="stat-label">Territories Captured</div><div class="stat-value" style="color:var(--green)">' + gameStats.captured + '</div></div>' +
    '<div class="stat-item"><div class="stat-label">Territories Lost</div><div class="stat-value" style="color:var(--red)">' + gameStats.lost + '</div></div>' +
    '<div class="stat-item"><div class="stat-label">Final Win %</div><div class="stat-value">' + (winProbHistory.length > 0 ? Math.round(winProbHistory[winProbHistory.length-1]*100) + '%' : 'N/A') + '</div></div>' +
  '</div>';

  // Build sparkline if we have data
  if (winProbHistory.length > 1) {
    statsHtml += '<div class="sparkline-container"><h4>Win Probability Over Time</h4>' + buildSparklineSVG(winProbHistory) + '</div>';
  }

  statsDiv.innerHTML = statsHtml;
  el.classList.add('show');
}

function buildSparklineSVG(data) {
  const w = 380, h = 60, pad = 4;
  const usableW = w - pad * 2;
  const usableH = h - pad * 2;
  let points = data.map(function(v, i) {
    var x = pad + (i / Math.max(1, data.length - 1)) * usableW;
    var y = pad + (1 - v) * usableH;
    return x + ',' + y;
  }).join(' ');
  // Area fill path
  var firstX = pad;
  var lastX = pad + usableW;
  var areaPath = 'M ' + firstX + ',' + (pad + usableH);
  data.forEach(function(v, i) {
    var x = pad + (i / Math.max(1, data.length - 1)) * usableW;
    var y = pad + (1 - v) * usableH;
    areaPath += ' L ' + x + ',' + y;
  });
  areaPath += ' L ' + lastX + ',' + (pad + usableH) + ' Z';

  return '<svg width="' + w + '" height="' + h + '" style="background:var(--bg);border-radius:6px;border:1px solid var(--border)">' +
    '<line x1="' + pad + '" y1="' + (pad + usableH/2) + '" x2="' + (w-pad) + '" y2="' + (pad + usableH/2) + '" stroke="var(--border)" stroke-dasharray="4,4"/>' +
    '<path d="' + areaPath + '" fill="rgba(37,99,235,0.15)"/>' +
    '<polyline points="' + points + '" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linejoin="round"/>' +
    '<text x="' + (w-pad) + '" y="' + (pad+6) + '" text-anchor="end" font-size="8" fill="var(--text3)">100%</text>' +
    '<text x="' + (w-pad) + '" y="' + (pad+usableH) + '" text-anchor="end" font-size="8" fill="var(--text3)">0%</text>' +
  '</svg>';
}

// ========== NEW GAME ==========

  // Clean up replay mode if active
  if (replayMode) {
    replayMode = false;
    replayStopAutoPlay();
    replayCache = {};

  document.getElementById('turn-log').innerHTML = '';

  deploys = {};
  orders = [];
  deployLeft = 0;
