<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>strat.club — History</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="description" content="Competitive territory strategy. 1v1, pure skill, zero luck. Play free at strat.club">
<meta name="theme-color" content="#0d1117">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#0f1419;--bg3:#1a1f2e;--border:#21293a;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --blue:#4a9eff;--red:#f87171;--green:#34d399;--gold:#fbbf24;
}
html,body{min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text)}

.content{max-width:820px;margin:0 auto;padding:24px 16px}
h2{font-size:20px;font-weight:700;margin-bottom:16px}

.match-list{display:flex;flex-direction:column;gap:8px}

.match-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;display:flex;align-items:center;gap:12px;transition:border-color .15s}
.match-card:hover{border-color:var(--text3)}

.match-date{font-size:11px;color:var(--text3);min-width:70px;text-align:center;line-height:1.4}

.match-players{flex:1;display:flex;align-items:center;gap:8px;font-size:14px;min-width:0}
.player-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.player-name.winner{color:var(--green);font-weight:700}
.player-name.loser{color:var(--text2)}
.vs{color:var(--text3);font-size:11px;font-weight:600;flex-shrink:0}

.match-rating{display:flex;flex-direction:column;align-items:flex-end;gap:2px;font-size:12px;min-width:80px}
.rating-change{font-weight:600}
.rating-change.positive{color:var(--green)}
.rating-change.negative{color:var(--red)}

.match-meta{display:flex;flex-direction:column;align-items:flex-end;gap:2px;font-size:11px;color:var(--text3);min-width:90px}
.match-map{color:var(--text2)}

.match-link{color:var(--blue);text-decoration:none;font-size:12px;font-weight:500;white-space:nowrap}
.match-link:hover{text-decoration:underline}

.pagination{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px}
.pagination button{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 14px;cursor:pointer;font-size:12px;font-weight:600;transition:background .15s}
.pagination button:hover:not(:disabled){background:var(--border)}
.pagination button:disabled{opacity:.4;cursor:not-allowed}
.pagination .page-info{font-size:13px;color:var(--text2);min-width:80px;text-align:center}

.filters{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.filters label{font-size:12px;color:var(--text2)}
.filters select{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px}
.filter-btn{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer;font-weight:500;transition:background .15s}
.filter-btn:hover{background:var(--border)}
.filter-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}

.empty-state{text-align:center;padding:48px 16px;color:var(--text2);font-size:14px}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}

@media (max-width: 768px) {
  .nav-links-desktop{display:none !important}
  .hamburger-btn{display:block !important}
  #mobile-nav-dropdown.open{display:flex !important}
  .match-card{flex-wrap:wrap;gap:8px}
  .match-rating,.match-meta{align-items:flex-start;flex-direction:row;gap:8px;min-width:auto}
  .match-date{min-width:auto}
  h2{font-size:18px}
  .filter-btn{min-height:44px;padding:8px 16px}
  .pagination button{min-height:44px;padding:8px 14px}
}
@media (max-width: 480px) {
  .match-card{padding:10px 12px}
  .player-name{max-width:100px}
}
</style>
</head>
<body>
<div style="position:fixed;bottom:8px;right:8px;z-index:9999;background:#d29922;color:#000;font-size:10px;font-weight:700;padding:3px 10px;border-radius:4px;opacity:0.75;">ALPHA — expect bugs</div>
<nav id="main-nav" style="background:#0f1419;border-bottom:1px solid #21293a;padding:0 16px;display:flex;align-items:center;justify-content:space-between;font-size:12px;height:48px;position:relative;">
  <a href="/" style="color:#fbbf24;font-weight:700;text-decoration:none;font-size:14px;">strat.club</a>
  <div class="nav-links-desktop" style="display:flex;gap:16px;align-items:center;">
    <a href="/" style="color:#8b949e;text-decoration:none;">Play</a>
    <a href="/games" style="color:#8b949e;text-decoration:none;">Games</a>
    <a href="/ladder" style="color:#8b949e;text-decoration:none;">Ladder</a>
    <a href="/history" style="color:#fff;text-decoration:none;">History</a>
    <a href="/feedback" style="color:#8b949e;text-decoration:none;">Feedback</a>
    <a href="https://discord.gg/URuwbk42bB" target="_blank" style="color:#5865F2;text-decoration:none;font-weight:600;">Discord</a>
  </div>
  <button class="hamburger-btn" onclick="document.getElementById('mobile-nav-dropdown').classList.toggle('open')" style="display:none;background:none;border:none;color:#e6edf3;font-size:22px;cursor:pointer;padding:8px;">&#9776;</button>
  <div id="mobile-nav-dropdown" style="display:none;position:absolute;top:48px;left:0;right:0;background:#0f1419;border-bottom:1px solid #21293a;flex-direction:column;padding:8px 16px;gap:8px;z-index:100;">
    <a href="/" style="color:#8b949e;text-decoration:none;padding:10px 0;display:block;border-bottom:1px solid #21293a;">Play</a>
    <a href="/games" style="color:#8b949e;text-decoration:none;padding:10px 0;display:block;border-bottom:1px solid #21293a;">Games</a>
    <a href="/ladder" style="color:#8b949e;text-decoration:none;padding:10px 0;display:block;border-bottom:1px solid #21293a;">Ladder</a>
    <a href="/history" style="color:#fff;text-decoration:none;padding:10px 0;display:block;border-bottom:1px solid #21293a;">History</a>
    <a href="/feedback" style="color:#8b949e;text-decoration:none;padding:10px 0;display:block;border-bottom:1px solid #21293a;">Feedback</a>
    <a href="https://discord.gg/URuwbk42bB" target="_blank" style="color:#5865F2;text-decoration:none;padding:10px 0;display:block;font-weight:600;">Discord</a>
  </div>
</nav>

<div class="content">
  <h2>Match History</h2>
  <div class="filters">
    <button class="filter-btn active" id="btn-all" onclick="setFilter('all')">All Matches</button>
    <button class="filter-btn" id="btn-mine" onclick="setFilter('mine')">My Matches</button>
  </div>
  <div id="history-content">
    <div class="empty-state">Loading match history...</div>
  </div>
</div>

<footer style="width:100%;text-align:center;padding:24px 16px;font-size:12px;color:#8b949e;border-top:1px solid #21293a;margin-top:24px;">
  strat.club
</footer>

<script>
var PAGE_SIZE = 20;
var currentPage = 0;
var currentFilter = 'all';
var currentUserId = null;
var userCache = {};
var matches = [];
var hasMore = true;

function escHtml(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function checkAuth() {
  try {
    var res = await fetch('/api/auth/me');
    if (res.ok) {
      var user = await res.json();
      currentUserId = user.id;
      userCache[user.id] = user.username;
    }
  } catch(e) {}
}

async function resolveUsername(userId) {
  if (userCache[userId]) return userCache[userId];
  try {
    var res = await fetch('/api/users/' + userId);
    if (res.ok) {
      var data = await res.json();
      userCache[userId] = data.username || userId.slice(0, 8);
      return userCache[userId];
    }
  } catch(e) {}
  userCache[userId] = userId.slice(0, 8);
  return userCache[userId];
}

async function resolveAllUsernames(matchList) {
  var ids = new Set();
  for (var m of matchList) {
    if (!userCache[m.player_a]) ids.add(m.player_a);
    if (!userCache[m.player_b]) ids.add(m.player_b);
  }
  await Promise.all([...ids].map(resolveUsername));
}

async function loadMatches() {
  var content = document.getElementById('history-content');
  var offset = currentPage * PAGE_SIZE;
  var url = '/api/match-history?limit=' + PAGE_SIZE + '&offset=' + offset;
  if (currentFilter === 'mine' && currentUserId) {
    url += '&user_id=' + currentUserId;
  }
  try {
    var res = await fetch(url);
    if (!res.ok) {
      content.innerHTML = '<div class="empty-state">Could not load match history. Database may not be configured.</div>';
      return;
    }
    matches = await res.json();
    if (!matches || matches.length === 0) {
      if (currentPage === 0) {
        content.innerHTML = '<div class="empty-state">No matches found. Play some games!</div>';
      } else {
        currentPage--;
        loadMatches();
      }
      return;
    }
    hasMore = matches.length === PAGE_SIZE;
    await resolveAllUsernames(matches);
    renderMatches();
  } catch(e) {
    content.innerHTML = '<div class="empty-state">Failed to load match history.</div>';
  }
}

function formatDate(isoStr) {
  var d = new Date(isoStr);
  var now = new Date();
  var diffMs = now - d;
  var diffH = diffMs / (1000 * 60 * 60);
  if (diffH < 1) return Math.max(1, Math.floor(diffMs / (1000 * 60))) + 'm ago';
  if (diffH < 24) return Math.floor(diffH) + 'h ago';
  var diffD = diffH / 24;
  if (diffD < 7) return Math.floor(diffD) + 'd ago';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function formatRatingChange(val) {
  if (val == null) return '';
  var rounded = Math.round(val);
  if (rounded >= 0) return '<span class="rating-change positive">+' + rounded + '</span>';
  return '<span class="rating-change negative">' + rounded + '</span>';
}

function renderMatches() {
  var content = document.getElementById('history-content');
  var html = '<div class="match-list">';

  for (var m of matches) {
    var nameA = escHtml(userCache[m.player_a] || m.player_a.slice(0, 8));
    var nameB = escHtml(userCache[m.player_b] || m.player_b.slice(0, 8));
    var aWon = m.winner_id === m.player_a;
    var bWon = m.winner_id === m.player_b;
    var draw = !m.winner_id;
    var classA = aWon ? 'winner' : (draw ? '' : 'loser');
    var classB = bWon ? 'winner' : (draw ? '' : 'loser');
    var ratingA = formatRatingChange(m.player_a_rating_change);
    var ratingB = formatRatingChange(m.player_b_rating_change);
    var mapName = m.template || 'Unknown';
    var turns = m.turns_played != null ? m.turns_played + ' turns' : '';

    html += '<div class="match-card">' +
      '<div class="match-date">' + formatDate(m.played_at) + '</div>' +
      '<div class="match-players">' +
        '<span class="player-name ' + classA + '" title="' + nameA + '">' + nameA + '</span>' +
        (ratingA ? ' ' + ratingA : '') +
        ' <span class="vs">vs</span> ' +
        '<span class="player-name ' + classB + '" title="' + nameB + '">' + nameB + '</span>' +
        (ratingB ? ' ' + ratingB : '') +
      '</div>' +
      '<div class="match-meta">' +
        '<span class="match-map">' + escHtml(mapName) + '</span>' +
        (turns ? '<span>' + turns + '</span>' : '') +
      '</div>' +
      '<a class="match-link" href="/game/' + m.game_id + '">View</a>' +
    '</div>';
  }

  html += '</div>';

  html += '<div class="pagination">' +
    '<button onclick="prevPage()" id="btn-prev"' + (currentPage === 0 ? ' disabled' : '') + '>&lsaquo; Prev</button>' +
    '<span class="page-info">Page ' + (currentPage + 1) + '</span>' +
    '<button onclick="nextPage()" id="btn-next"' + (!hasMore ? ' disabled' : '') + '>Next &rsaquo;</button>' +
    '</div>';

  content.innerHTML = html;
}

function prevPage() {
  if (currentPage > 0) { currentPage--; loadMatches(); }
}

function nextPage() {
  if (hasMore) { currentPage++; loadMatches(); }
}

function setFilter(filter) {
  currentFilter = filter;
  currentPage = 0;
  document.getElementById('btn-all').classList.toggle('active', filter === 'all');
  document.getElementById('btn-mine').classList.toggle('active', filter === 'mine');
  loadMatches();
}

checkAuth().then(loadMatches);
</script>
</body>
</html>
