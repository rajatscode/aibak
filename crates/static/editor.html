<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Editor</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117; --bg2: #161b22; --bg3: #21262d; --bg4: #30363d;
  --text: #e6edf3; --text2: #8b949e; --accent: #58a6ff; --accent2: #388bfd;
  --green: #3fb950; --red: #f85149; --yellow: #d29922; --purple: #bc8cff;
  --orange: #f0883e;
}
html, body { height: 100%; overflow: hidden; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 14px; display: flex; flex-direction: column; }
button { background: var(--bg3); color: var(--text); border: 1px solid var(--bg4); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: background 0.15s; }
button:hover { background: var(--bg4); }
button.active { background: var(--accent2); border-color: var(--accent); }
button.primary { background: var(--accent2); border-color: var(--accent); }
button.primary:hover { background: var(--accent); }
button.danger { background: #da3633; border-color: #f85149; }
button.danger:hover { background: #f85149; }
input, select { background: var(--bg); color: var(--text); border: 1px solid var(--bg4); padding: 5px 8px; border-radius: 4px; font-size: 13px; outline: none; }
input:focus { border-color: var(--accent); }
label { color: var(--text2); font-size: 12px; display: block; margin-bottom: 2px; }

/* Toolbar */
#toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--bg2); border-bottom: 1px solid var(--bg4); flex-shrink: 0; }
#toolbar .sep { width: 1px; height: 24px; background: var(--bg4); }
#toolbar .title { font-weight: 600; font-size: 15px; margin-right: 8px; color: var(--accent); }

/* Main layout */
#main { display: flex; flex: 1; overflow: hidden; }
#canvas-wrap { flex: 1; position: relative; overflow: hidden; background: var(--bg); }
#canvas-wrap svg { width: 100%; height: 100%; }

/* Sidebar */
#sidebar { width: 340px; min-width: 340px; background: var(--bg2); border-left: 1px solid var(--bg4); display: flex; flex-direction: column; overflow: hidden; }
.panel { border-bottom: 1px solid var(--bg4); }
.panel-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; cursor: pointer; user-select: none; background: var(--bg3); font-weight: 600; font-size: 13px; }
.panel-header:hover { background: var(--bg4); }
.panel-body { padding: 10px 12px; max-height: 300px; overflow-y: auto; }
.panel-body.collapsed { display: none; }
.panel-body .row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.panel-body .row label { margin: 0; min-width: 70px; }
.panel-body .row input { flex: 1; }
.panel-body .row input[type="number"] { width: 60px; flex: none; }
.panel-body .row input[type="checkbox"] { width: auto; flex: none; }

/* Territory list */
.terr-item { display: flex; align-items: center; gap: 6px; padding: 4px 6px; border-radius: 4px; cursor: pointer; font-size: 13px; }
.terr-item:hover { background: var(--bg3); }
.terr-item.selected { background: var(--bg4); outline: 1px solid var(--accent); }
.terr-item .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.terr-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.terr-item .tid { color: var(--text2); font-size: 11px; }

/* Bonus list */
.bonus-item { padding: 6px 8px; border-radius: 4px; cursor: pointer; margin-bottom: 4px; border: 1px solid transparent; }
.bonus-item:hover { border-color: var(--bg4); }
.bonus-item.selected { border-color: var(--accent); background: var(--bg3); }
.bonus-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.bonus-header .swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
.bonus-header .bname { flex: 1; font-weight: 600; font-size: 13px; }
.bonus-header .bval { color: var(--green); font-weight: 700; font-size: 13px; }
.bonus-terrs { display: flex; flex-wrap: wrap; gap: 3px; }
.bonus-terrs .chip { background: var(--bg4); padding: 1px 6px; border-radius: 10px; font-size: 11px; color: var(--text2); cursor: pointer; }
.bonus-terrs .chip:hover { background: var(--red); color: white; }

/* Scrollable panels container */
#panels-scroll { flex: 1; overflow-y: auto; }

/* Tooltip */
#tooltip { position: absolute; background: var(--bg3); border: 1px solid var(--bg4); padding: 6px 10px; border-radius: 6px; font-size: 12px; pointer-events: none; display: none; z-index: 100; white-space: nowrap; }

/* Status bar */
#statusbar { display: flex; align-items: center; gap: 12px; padding: 4px 12px; background: var(--bg2); border-top: 1px solid var(--bg4); font-size: 12px; color: var(--text2); flex-shrink: 0; }

/* Toast notification */
#toast { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); background: var(--bg3); border: 1px solid var(--bg4); color: var(--text); padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 300; display: none; max-width: 500px; white-space: pre-line; box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
#toast.error { border-color: var(--red); color: var(--red); }
#toast.success { border-color: var(--green); color: var(--green); }

/* Modal overlay */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 200; }
.modal { background: var(--bg2); border: 1px solid var(--bg4); border-radius: 10px; padding: 20px; min-width: 400px; max-width: 600px; max-height: 80vh; overflow-y: auto; }
.modal h3 { margin-bottom: 12px; }
.modal textarea { width: 100%; height: 300px; background: var(--bg); color: var(--text); border: 1px solid var(--bg4); border-radius: 4px; font-family: monospace; font-size: 12px; padding: 8px; resize: vertical; }
.modal .actions { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
</style>
</head>
<body>

<div id="toolbar">
  <span class="title">Map Editor</span>
  <div class="sep"></div>
  <button id="btn-select" class="active" onclick="setMode('select')" title="Select & move territories (S)">Select</button>
  <button id="btn-territory" onclick="setMode('territory')" title="Place territory nodes (T)">+ Territory</button>
  <button id="btn-connection" onclick="setMode('connection')" title="Draw connections between territories (C)">+ Connection</button>
  <div class="sep"></div>
  <button onclick="autoLayout()" title="Force-directed auto-layout (L)">Auto-Layout</button>
  <button onclick="generateShapes()" title="Generate organic territory shapes (G)">Gen Shapes</button>
  <button onclick="autoClusters()" title="Auto-detect bonus regions (K)">Auto-Cluster</button>
  <div class="sep"></div>
  <button onclick="clearShapes()">Clear Shapes</button>
  <button onclick="validateGraph()" title="Check graph connectivity (V)">Validate</button>
  <button onclick="undo()" title="Undo last action (Ctrl+Z)">Undo</button>
  <div class="sep"></div>
  <button class="primary" onclick="showExport()">Export JSON</button>
  <button onclick="showImport()">Import JSON</button>
</div>

<div id="main">
  <div id="canvas-wrap">
    <svg id="svg" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-auto">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--text2)"/>
        </marker>
        <radialGradient id="ocean-gradient" cx="50%" cy="50%" r="70%">
          <stop offset="0%" stop-color="#0f2240"/>
          <stop offset="100%" stop-color="#0a1628"/>
        </radialGradient>
        <filter id="territory-shadow" x="-10%" y="-10%" width="120%" height="130%">
          <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.5"/>
        </filter>
        <filter id="territory-hover" x="-10%" y="-10%" width="120%" height="130%">
          <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.6"/>
        </filter>
      </defs>
      <rect id="ocean-bg" fill="url(#ocean-gradient)" style="display:none"/>
      <g id="g-ocean-detail"></g>
      <g id="g-shapes"></g>
      <g id="g-connections"></g>
      <g id="g-nodes"></g>
      <g id="g-labels"></g>
      <line id="conn-preview" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="6,4" style="display:none" pointer-events="none"/>
    </svg>
    <div id="tooltip"></div>
  </div>

  <div id="sidebar">
    <div id="panels-scroll">
      <!-- Map Settings -->
      <div class="panel" id="panel-settings">
        <div class="panel-header" onclick="togglePanel('settings')">Map Settings <span id="arrow-settings">&#9660;</span></div>
        <div class="panel-body" id="body-settings">
          <div class="row"><label>Map ID</label><input id="set-id" value="custom_map" oninput="mapData.id=this.value"></div>
          <div class="row"><label>Map Name</label><input id="set-name" value="Custom Map" oninput="mapData.name=this.value"></div>
          <div class="row"><label>Picks</label><input id="set-picks" type="number" value="4" min="1" max="20" oninput="mapData.picking.num_picks=+this.value"></div>
          <div class="row"><label>Base Income</label><input id="set-income" type="number" value="5" min="0" oninput="mapData.settings.base_income=+this.value"></div>
          <div class="row"><label>Fog of War</label><input id="set-fog" type="checkbox" checked onchange="mapData.settings.fog_of_war=this.checked"></div>
        </div>
      </div>

      <!-- Territory Editor -->
      <div class="panel" id="panel-territory">
        <div class="panel-header" onclick="togglePanel('territory')">Territory Editor <span id="arrow-territory">&#9660;</span></div>
        <div class="panel-body" id="body-territory">
          <div id="terr-editor-empty" style="color:var(--text2)">Click a territory to edit</div>
          <div id="terr-editor" style="display:none">
            <div class="row"><label>ID</label><span id="te-id"></span></div>
            <div class="row"><label>Name</label><input id="te-name" oninput="updateTerrName(this.value)"></div>
            <div class="row"><label>Armies</label><input id="te-armies" type="number" min="1" value="2" oninput="updateTerrArmies(+this.value)"></div>
            <div class="row"><label>Wasteland</label><input id="te-waste" type="checkbox" onchange="updateTerrWasteland(this.checked)"></div>
            <div class="row"><label>Bonus</label><select id="te-bonus" onchange="updateTerrBonus(+this.value)"></select></div>
            <div class="row"><label>Connections</label><span id="te-conn" style="font-size:12px;color:var(--text2)"></span></div>
            <div class="row" style="margin-top:6px"><button class="danger" onclick="deleteSelectedTerritory()">Delete Territory</button></div>
          </div>
        </div>
      </div>

      <!-- Territory List -->
      <div class="panel" id="panel-terrlist">
        <div class="panel-header" onclick="togglePanel('terrlist')">Territories (<span id="terr-count">0</span>) <span id="arrow-terrlist">&#9660;</span></div>
        <div class="panel-body" id="body-terrlist">
          <div id="terr-list"></div>
        </div>
      </div>

      <!-- Bonus Editor -->
      <div class="panel" id="panel-bonuses">
        <div class="panel-header" onclick="togglePanel('bonuses')">Bonuses (<span id="bonus-count">0</span>) <span id="arrow-bonuses">&#9660;</span></div>
        <div class="panel-body" id="body-bonuses">
          <div id="bonus-list"></div>
          <button style="margin-top:6px;width:100%" onclick="addBonus()">+ Add Bonus</button>
        </div>
      </div>

      <!-- Bonus Detail Editor -->
      <div class="panel" id="panel-bonusedit" style="display:none">
        <div class="panel-header" onclick="togglePanel('bonusedit')">Bonus Detail <span id="arrow-bonusedit">&#9660;</span></div>
        <div class="panel-body" id="body-bonusedit">
          <div class="row"><label>Name</label><input id="be-name" oninput="updateBonusName(this.value)"></div>
          <div class="row"><label>Value</label><input id="be-value" type="number" min="0" oninput="updateBonusValue(+this.value)"></div>
          <div class="row"><label>Color</label><input id="be-color" type="color" onchange="updateBonusColor(this.value)"></div>
          <div class="row"><label>Territories</label></div>
          <div id="be-terrs" class="bonus-terrs"></div>
          <div class="row" style="margin-top:6px">
            <button onclick="startAddTerrToBonus()">+ Add Territory</button>
            <button class="danger" onclick="deleteSelectedBonus()">Delete Bonus</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="statusbar">
  <span id="status-mode">Mode: Select</span>
  <span id="status-info">0 territories, 0 connections</span>
  <span style="flex:1"></span>
  <span id="status-pos">0, 0</span>
</div>

<script>
// ============================================================
//  DATA MODEL
// ============================================================
const BONUS_COLORS = [
  '#58a6ff','#3fb950','#f0883e','#bc8cff','#d29922','#f85149',
  '#79c0ff','#56d364','#ffa657','#d2a8ff','#e3b341','#ff7b72',
  '#39d353','#a5d6ff','#ffc680','#c297ff','#e6b422','#ff9999',
  '#66d9ef','#a6e3a1','#fab387','#cba6f7','#f9e2af','#f38ba8',
];

let territories = [];
let connections = [];
let bonuses = [];
let nextTerrId = 0;
let nextBonusId = 0;

let mapData = {
  id: 'custom_map',
  name: 'Custom Map',
  picking: { num_picks: 4, method: 'random_warlords' },
  settings: {
    luck_pct: 0, base_income: 5, wasteland_armies: 10,
    unpicked_neutral_armies: 4, fog_of_war: true,
    offense_kill_rate: 0.6, defense_kill_rate: 0.7
  }
};

// ============================================================
//  UNDO STACK
// ============================================================
let undoStack = [];
function pushUndo(desc) {
  undoStack.push({
    desc,
    territories: JSON.parse(JSON.stringify(territories)),
    connections: JSON.parse(JSON.stringify(connections)),
    bonuses: JSON.parse(JSON.stringify(bonuses)),
    nextTerrId, nextBonusId
  });
  if (undoStack.length > 50) undoStack.shift();
}
function undo() {
  if (!undoStack.length) return;
  const s = undoStack.pop();
  territories = s.territories;
  connections = s.connections;
  bonuses = s.bonuses;
  nextTerrId = s.nextTerrId;
  nextBonusId = s.nextBonusId;
  selectedTerr = null; selectedBonus = null;
  fullRender();
}

// ============================================================
//  MODE & SELECTION STATE
// ============================================================
let mode = 'select'; // 'select','territory','connection'
let selectedTerr = null;
let selectedBonus = null;
let connStart = null;
let dragging = null;
let dragOffset = {x:0,y:0};
let addingTerrToBonus = false;

// SVG pan & zoom
let viewBox = {x:0, y:0, w:1200, h:800};
let isPanning = false;
let panStart = {x:0,y:0};

function setMode(m) {
  mode = m;
  connStart = null;
  addingTerrToBonus = false;
  document.getElementById('conn-preview').style.display = 'none';
  document.querySelectorAll('#toolbar button').forEach(b => {
    if (b.id.startsWith('btn-')) b.classList.remove('active');
  });
  const btn = document.getElementById('btn-' + m);
  if (btn) btn.classList.add('active');
  document.getElementById('status-mode').textContent = 'Mode: ' + {select:'Select',territory:'+ Territory',connection:'+ Connection'}[m];
  updateCursor();
}

function updateCursor() {
  const wrap = document.getElementById('canvas-wrap');
  wrap.style.cursor = {select:'default', territory:'crosshair', connection:'pointer'}[mode] || 'default';
}

// ============================================================
//  SVG HELPERS
// ============================================================
const svg = document.getElementById('svg');

function updateViewBox() {
  svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
}

function svgPoint(e) {
  const rect = svg.getBoundingClientRect();
  const sx = (e.clientX - rect.left) / rect.width;
  const sy = (e.clientY - rect.top) / rect.height;
  return { x: viewBox.x + sx * viewBox.w, y: viewBox.y + sy * viewBox.h };
}

function initView() {
  const rect = svg.getBoundingClientRect();
  viewBox.w = 1200;
  viewBox.h = 1200 * rect.height / rect.width;
  viewBox.x = 0; viewBox.y = 0;
  updateViewBox();
}

// ============================================================
//  SVG EVENT HANDLERS
// ============================================================
svg.addEventListener('mousedown', e => {
  if (e.button === 1 || (e.button === 0 && e.altKey)) {
    isPanning = true;
    panStart = {x: e.clientX, y: e.clientY};
    e.preventDefault();
    return;
  }
  const pt = svgPoint(e);
  const hit = hitTestTerritory(pt);

  if (mode === 'territory' && !hit) {
    pushUndo('Add territory');
    addTerritory(pt.x, pt.y);
    fullRender();
    return;
  }

  if (mode === 'connection') {
    if (hit !== null) {
      if (connStart === null) {
        connStart = hit;
      } else if (connStart !== hit) {
        pushUndo('Add connection');
        addConnection(connStart, hit);
        connStart = null;
        document.getElementById('conn-preview').style.display = 'none';
        fullRender();
      }
    }
    return;
  }

  if (mode === 'select') {
    if (addingTerrToBonus && hit !== null && selectedBonus !== null) {
      pushUndo('Add territory to bonus');
      const b = bonuses.find(b => b.id === selectedBonus);
      const t = territories.find(t => t.id === hit);
      if (b && t && !b.territory_ids.includes(hit)) {
        // Remove from old bonus
        bonuses.forEach(ob => { ob.territory_ids = ob.territory_ids.filter(x => x !== hit); });
        b.territory_ids.push(hit);
        t.bonus_id = b.id;
      }
      addingTerrToBonus = false;
      fullRender();
      return;
    }
    if (hit !== null) {
      selectTerritory(hit);
      dragging = hit;
      const t = territories.find(t => t.id === hit);
      dragOffset = {x: pt.x - t.x, y: pt.y - t.y};
    } else {
      selectTerritory(null);
    }
  }
});

svg.addEventListener('mousemove', e => {
  const pt = svgPoint(e);
  document.getElementById('status-pos').textContent = `${Math.round(pt.x)}, ${Math.round(pt.y)}`;

  if (isPanning) {
    const rect = svg.getBoundingClientRect();
    const dx = (e.clientX - panStart.x) / rect.width * viewBox.w;
    const dy = (e.clientY - panStart.y) / rect.height * viewBox.h;
    viewBox.x -= dx; viewBox.y -= dy;
    panStart = {x: e.clientX, y: e.clientY};
    updateViewBox();
    return;
  }

  if (dragging !== null) {
    const t = territories.find(t => t.id === dragging);
    if (t) {
      t.x = pt.x - dragOffset.x;
      t.y = pt.y - dragOffset.y;
      renderNodes();
      renderConnections();
      renderLabels();
    }
    return;
  }

  if (mode === 'connection' && connStart !== null) {
    const t = territories.find(t => t.id === connStart);
    const line = document.getElementById('conn-preview');
    line.style.display = '';
    line.setAttribute('x1', t.x);
    line.setAttribute('y1', t.y);
    line.setAttribute('x2', pt.x);
    line.setAttribute('y2', pt.y);
  }

  // Hover tooltip
  const hit = hitTestTerritory(pt);
  const tooltip = document.getElementById('tooltip');
  if (hit !== null) {
    const t = territories.find(t => t.id === hit);
    const b = bonuses.find(b => b.territory_ids.includes(hit));
    tooltip.innerHTML = `<b>${t.name}</b> (ID: ${t.id})<br>Armies: ${t.default_armies}${t.is_wasteland?' [Wasteland]':''}${b?'<br>Bonus: '+b.name:''}`;
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX - document.getElementById('canvas-wrap').getBoundingClientRect().left + 14) + 'px';
    tooltip.style.top = (e.clientY - document.getElementById('canvas-wrap').getBoundingClientRect().top + 14) + 'px';
  } else {
    tooltip.style.display = 'none';
  }
});

svg.addEventListener('mouseup', e => {
  if (isPanning) { isPanning = false; return; }
  if (dragging !== null) {
    dragging = null;
    renderShapes();
  }
});

svg.addEventListener('wheel', e => {
  e.preventDefault();
  const pt = svgPoint(e);
  const factor = e.deltaY > 0 ? 1.1 : 0.9;
  const nw = viewBox.w * factor;
  const nh = viewBox.h * factor;
  viewBox.x = pt.x - (pt.x - viewBox.x) * factor;
  viewBox.y = pt.y - (pt.y - viewBox.y) * factor;
  viewBox.w = nw; viewBox.h = nh;
  updateViewBox();
}, {passive: false});

// ============================================================
//  HIT TESTING
// ============================================================
function hitTestTerritory(pt, radius=16) {
  let best = null, bestD = radius*radius;
  for (const t of territories) {
    const dx = pt.x - t.x, dy = pt.y - t.y;
    const d = dx*dx + dy*dy;
    if (d < bestD) { bestD = d; best = t.id; }
  }
  return best;
}

// ============================================================
//  DATA OPERATIONS
// ============================================================
function addTerritory(x, y) {
  const id = nextTerrId++;
  territories.push({
    id, name: `Territory ${id}`, x, y,
    bonus_id: 0, is_wasteland: false, default_armies: 2,
    shape: null
  });
  return id;
}

function addConnection(a, b) {
  if (a === b) return;
  const exists = connections.some(c =>
    (c[0] === a && c[1] === b) || (c[0] === b && c[1] === a)
  );
  if (!exists) connections.push([a, b]);
}

function removeConnection(a, b) {
  connections = connections.filter(c =>
    !((c[0]===a && c[1]===b) || (c[0]===b && c[1]===a))
  );
}

function deleteTerritory(id) {
  territories = territories.filter(t => t.id !== id);
  connections = connections.filter(c => c[0] !== id && c[1] !== id);
  bonuses.forEach(b => { b.territory_ids = b.territory_ids.filter(t => t !== id); });
}

function addBonus() {
  pushUndo('Add bonus');
  const id = nextBonusId++;
  bonuses.push({
    id, name: `Bonus ${id}`, value: 2,
    color: BONUS_COLORS[id % BONUS_COLORS.length],
    territory_ids: []
  });
  fullRender();
  selectBonus(id);
}

function deleteBonus(id) {
  bonuses = bonuses.filter(b => b.id !== id);
  territories.forEach(t => { if (t.bonus_id === id) t.bonus_id = 0; });
}

// ============================================================
//  SELECTION
// ============================================================
function selectTerritory(id) {
  selectedTerr = id;
  const edEmpty = document.getElementById('terr-editor-empty');
  const ed = document.getElementById('terr-editor');
  if (id === null) {

function renderConnections() {
  const g = document.getElementById('g-connections');
  g.innerHTML = '';
  for (const [a, b] of connections) {
    const ta = territories.find(t => t.id === a);
    const tb = territories.find(t => t.id === b);
    if (!ta || !tb) continue;

    const dx = tb.x - ta.x, dy = tb.y - ta.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    // Check if cross-cluster (different bonuses)
    const ba = bonuses.find(bn => bn.territory_ids.includes(a));
    const bb = bonuses.find(bn => bn.territory_ids.includes(b));
    const crossCluster = ba && bb && ba.id !== bb.id && dist > 200;

    const line = document.createElementNS('http://www.w3.org/2000/svg', crossCluster ? 'path' : 'line');
    if (crossCluster) {
      // Curved dashed line
      const mx = (ta.x + tb.x)/2, my = (ta.y + tb.y)/2;
      const nx = -dy / dist * 40, ny = dx / dist * 40;
      line.setAttribute('d', `M${ta.x},${ta.y} Q${mx+nx},${my+ny} ${tb.x},${tb.y}`);
      line.setAttribute('fill', 'none');
      line.setAttribute('stroke', '#8b949e');
      line.setAttribute('stroke-width', '1.5');
      line.setAttribute('stroke-dasharray', '8,5');
      line.setAttribute('opacity', '0.5');
    } else {
      line.setAttribute('x1', ta.x); line.setAttribute('y1', ta.y);
      line.setAttribute('x2', tb.x); line.setAttribute('y2', tb.y);
      line.setAttribute('stroke', '#8b949e');
      line.setAttribute('stroke-width', '1.5');
      line.setAttribute('opacity', '0.4');
    }
    g.appendChild(line);
  }
}

// ============================================================
//  FORCE-DIRECTED LAYOUT
// ============================================================
function forceLayout() {
  if (territories.length === 0) return;
  pushUndo('Auto-layout');

  const N = territories.length;
  const k_spring = 0.005;
  const k_repel = 8000;
  const damping = 0.92;
  const idealLen = 120;
  const iterations = 600;

  // Center territories if spread is tiny
  const cx = territories.reduce((s,t)=>s+t.x,0)/N;
  const cy = territories.reduce((s,t)=>s+t.y,0)/N;
  const spread = Math.sqrt(territories.reduce((s,t)=>s+(t.x-cx)**2+(t.y-cy)**2,0)/N);
  if (spread < 50) {
    // Randomize positions in a circle
    territories.forEach((t, i) => {
      const angle = (2*Math.PI*i)/N;
      const r = 100 + Math.random()*200;
      t.x = 600 + Math.cos(angle)*r;
      t.y = 400 + Math.sin(angle)*r;
    });
  }

  const vx = new Float64Array(N);
  const vy = new Float64Array(N);

  // Build adjacency lookup
  const adj = new Set();
  connections.forEach(([a,b]) => { adj.add(a+','+b); adj.add(b+','+a); });

  for (let iter = 0; iter < iterations; iter++) {
    const fx = new Float64Array(N);
    const fy = new Float64Array(N);

    // Repulsion between all pairs
    for (let i = 0; i < N; i++) {
      for (let j = i+1; j < N; j++) {
        let dx = territories[j].x - territories[i].x;
        let dy = territories[j].y - territories[i].y;
        let d2 = dx*dx + dy*dy;
        if (d2 < 1) d2 = 1;
        const d = Math.sqrt(d2);
        const f = k_repel / d2;
        const fdx = f * dx / d;
        const fdy = f * dy / d;
        fx[i] -= fdx; fy[i] -= fdy;
        fx[j] += fdx; fy[j] += fdy;
      }
    }

    // Spring attraction for connections
    for (const [a, b] of connections) {
      const ia = territories.findIndex(t => t.id === a);
      const ib = territories.findIndex(t => t.id === b);
      if (ia < 0 || ib < 0) continue;
      let dx = territories[ib].x - territories[ia].x;
      let dy = territories[ib].y - territories[ia].y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < 1) continue;
      const displacement = d - idealLen;
      const f = k_spring * displacement;
      const fdx = f * dx / d;
      const fdy = f * dy / d;
      fx[ia] += fdx; fy[ia] += fdy;
      fx[ib] -= fdx; fy[ib] -= fdy;
    }

    // Center gravity
    const gcx = territories.reduce((s,t)=>s+t.x,0)/N;
    const gcy = territories.reduce((s,t)=>s+t.y,0)/N;
    for (let i = 0; i < N; i++) {
      fx[i] += (600 - gcx) * 0.001;
      fy[i] += (400 - gcy) * 0.001;
    }

    // Update velocities and positions
    for (let i = 0; i < N; i++) {
      vx[i] = (vx[i] + fx[i]) * damping;
      vy[i] = (vy[i] + fy[i]) * damping;
      // Limit velocity
      const speed = Math.sqrt(vx[i]*vx[i]+vy[i]*vy[i]);
      if (speed > 20) {
        vx[i] = vx[i]/speed*20;
        vy[i] = vy[i]/speed*20;
      }
      territories[i].x += vx[i];
      territories[i].y += vy[i];
    }
  }

  fullRender();
  fitView();
}

function autoLayout() {
  forceLayout();
}

function fitView() {
  if (territories.length === 0) return;
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  territories.forEach(t => {
    if (t.x < minX) minX = t.x;
    if (t.y < minY) minY = t.y;
    if (t.x > maxX) maxX = t.x;
    if (t.y > maxY) maxY = t.y;
  });
  const pad = 100;
  const w = maxX - minX + pad*2;
  const h = maxY - minY + pad*2;
  const rect = svg.getBoundingClientRect();
  const aspect = rect.width / rect.height;
  if (w/h > aspect) {
    viewBox.w = w; viewBox.h = w / aspect;
  } else {
    viewBox.h = h; viewBox.w = h * aspect;
  }
  viewBox.x = minX - pad - (viewBox.w - (maxX-minX))/2;
  viewBox.y = minY - pad - (viewBox.h - (maxY-minY))/2;
  updateViewBox();
}

// ============================================================
//  GRAPH VALIDATION
// ============================================================
function validateGraph() {
  if (territories.length === 0) {
    showToast('No territories to validate.', 'error');
    return false;
  }
  // BFS from first territory
  const adjMap = {};
  territories.forEach(t => adjMap[t.id] = []);
  connections.forEach(([a, b]) => {
    if (adjMap[a]) adjMap[a].push(b);
    if (adjMap[b]) adjMap[b].push(a);
  });

  const visited = new Set();
  const queue = [territories[0].id];
  visited.add(territories[0].id);
  while (queue.length > 0) {
    const curr = queue.shift();
    for (const nb of (adjMap[curr] || [])) {
      if (!visited.has(nb)) {
        visited.add(nb);
        queue.push(nb);
      }
    }
  }

  const unreachable = territories.filter(t => !visited.has(t.id));
  if (unreachable.length === 0) {
    showToast('Graph is fully connected.', 'success');
    return true;
  } else {
    const names = unreachable.map(t => t.name).join(', ');
    showToast('Disconnected territories: ' + names, 'error', 6000);
    return false;
  }
}

// ============================================================
//  SEEDED RANDOM (for reproducible shapes)
// ============================================================
function makeRng(seed) {
  let s = seed | 0;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 4294967296;
  };
}

// ============================================================
//  ORGANIC SHAPE GENERATION
// ============================================================

// Compute connected components
function findComponents() {
  const adjMap = {};
  territories.forEach(t => adjMap[t.id] = []);
  connections.forEach(([a, b]) => {
    if (adjMap[a]) adjMap[a].push(b);
    if (adjMap[b]) adjMap[b].push(a);
  });
  const visited = new Set();
  const components = [];
  for (const t of territories) {
    if (visited.has(t.id)) continue;
    const comp = [];
    const queue = [t.id];
    visited.add(t.id);
    while (queue.length > 0) {
      const curr = queue.shift();
      comp.push(curr);
      for (const nb of (adjMap[curr] || [])) {
        if (!visited.has(nb)) {
          visited.add(nb);
          queue.push(nb);
        }
      }
    }
    components.push(comp);
  }
  return components;
}

// Check if two territories are connected
function areConnected(a, b) {
  return connections.some(c =>
    (c[0] === a && c[1] === b) || (c[0] === b && c[1] === a)
  );
}

// Perpendicular bisector clipping (kept from original for Voronoi base)
function clipPolygonByBisector(poly, site, other) {
  const mx = (site.x + other.x) / 2;
  const my = (site.y + other.y) / 2;
  const nx = other.x - site.x;
  const ny = other.y - site.y;
  const output = [];
  const n = poly.length;
  for (let i = 0; i < n; i++) {
    const curr = poly[i];
    const next = poly[(i + 1) % n];
    const dc = (curr.x - mx) * nx + (curr.y - my) * ny;
    const dn = (next.x - mx) * nx + (next.y - my) * ny;
    if (dc <= 0) output.push(curr);
    if ((dc <= 0) !== (dn <= 0)) {
      const t = dc / (dc - dn);
      output.push({
        x: curr.x + t * (next.x - curr.x),
        y: curr.y + t * (next.y - curr.y)
      });
    }
  }
  return output;
}

// Compute raw Voronoi polygon for a site
function computeVoronoiPoly(site, bx, by, bw, bh) {
  let poly = [
    { x: bx, y: by },
    { x: bx + bw, y: by },
    { x: bx + bw, y: by + bh },
    { x: bx, y: by + bh }
  ];
  for (const other of territories) {
    if (other.id === site.id) continue;
    poly = clipPolygonByBisector(poly, site, other);
    if (poly.length < 3) return [];
  }
  return poly;
}

// Check if a polygon edge lies on the bounding rectangle
function isExternalEdge(p1, p2, bx, by, bw, bh) {
  const eps = 1.0;
  const onLeft = Math.abs(p1.x - bx) < eps && Math.abs(p2.x - bx) < eps;
  const onRight = Math.abs(p1.x - (bx + bw)) < eps && Math.abs(p2.x - (bx + bw)) < eps;
  const onTop = Math.abs(p1.y - by) < eps && Math.abs(p2.y - by) < eps;
  const onBottom = Math.abs(p1.y - (by + bh)) < eps && Math.abs(p2.y - (by + bh)) < eps;
  return onLeft || onRight || onTop || onBottom;
}

// Find which other territory shares an edge (approximate: midpoint closest)
function findSharedTerritory(site, p1, p2) {
  const mx = (p1.x + p2.x) / 2;
  const my = (p1.y + p2.y) / 2;
  let bestId = -1, bestD = Infinity;
  for (const t of territories) {
    if (t.id === site.id) continue;
    const dx = t.x - mx, dy = t.y - my;
    const d = dx * dx + dy * dy;
    if (d < bestD) { bestD = d; bestId = t.id; }
  }
  return bestId;
}

// Midpoint displacement fractal perturbation along an edge
function perturbEdge(p1, p2, roughness, rng, levels) {
  levels = levels || 4;
  let points = [{ x: p1.x, y: p1.y }, { x: p2.x, y: p2.y }];

  for (let level = 0; level < levels; level++) {
    const newPoints = [points[0]];
    for (let i = 0; i < points.length - 1; i++) {
      const a = points[i];
      const b = points[i + 1];
      const mx = (a.x + b.x) / 2;
      const my = (a.y + b.y) / 2;
      // Perpendicular direction
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const len = Math.sqrt(dx * dx + dy * dy);
      if (len < 0.5) {
        newPoints.push(b);
        continue;
      }
      const nx = -dy / len;
      const ny = dx / len;
      // Offset with decreasing roughness per level
      const scale = roughness * Math.pow(0.55, level);
      const offset = (rng() - 0.5) * 2 * scale;
      newPoints.push({ x: mx + nx * offset, y: my + ny * offset });
      newPoints.push(b);
    }
    points = newPoints;
  }
  return points;
}

// Convert array of points to smooth SVG path using Catmull-Rom -> cubic bezier
function pointsToSmoothPath(points, closed) {
  if (points.length < 3) {
    let d = `M${points[0].x.toFixed(1)},${points[0].y.toFixed(1)}`;
    for (let i = 1; i < points.length; i++) {
      d += `L${points[i].x.toFixed(1)},${points[i].y.toFixed(1)}`;
    }
    if (closed) d += 'Z';
    return d;
  }

  const pts = closed
    ? [points[points.length - 1], ...points, points[0], points[1]]
    : [points[0], ...points, points[points.length - 1]];

  let d = `M${pts[1].x.toFixed(1)},${pts[1].y.toFixed(1)}`;
  const tension = 0.35;

  for (let i = 1; i < pts.length - 2; i++) {
    const p0 = pts[i - 1], p1 = pts[i], p2 = pts[i + 1], p3 = pts[i + 2];
    const cp1x = p1.x + (p2.x - p0.x) * tension;
    const cp1y = p1.y + (p2.y - p0.y) * tension;
    const cp2x = p2.x - (p3.x - p1.x) * tension;
    const cp2y = p2.y - (p3.y - p1.y) * tension;
    d += `C${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${p2.x.toFixed(1)},${p2.y.toFixed(1)}`;
  }

  if (closed) d += 'Z';
  return d;
}

// Store organic generation data for rendering ocean/sea routes
let organicShapeData = null;

function generateShapes() {
  if (territories.length < 2) return;
  pushUndo('Generate shapes');

  // Compute bounding box
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  territories.forEach(t => {
    if (t.x < minX) minX = t.x;
    if (t.y < minY) minY = t.y;
    if (t.x > maxX) maxX = t.x;
    if (t.y > maxY) maxY = t.y;
  });
  const pad = 80;
  const bx = minX - pad, by = minY - pad;
  const bw = (maxX - minX) + pad * 2, bh = (maxY - minY) + pad * 2;

  // Create seeded RNG for reproducibility per territory
  const rng = makeRng(42);

  // Find connected components for island detection
  const components = findComponents();

  // Build connection set for quick lookups
  const connSet = new Set();
  connections.forEach(([a, b]) => {
    connSet.add(a + ',' + b);
    connSet.add(b + ',' + a);
  });

  // Compute center of mass for terrain variation
  const cx = territories.reduce((s, t) => s + t.x, 0) / territories.length;
  const cy = territories.reduce((s, t) => s + t.y, 0) / territories.length;
  const maxDist = Math.max(1, Math.sqrt(
    territories.reduce((s, t) => Math.max(s, (t.x - cx) ** 2 + (t.y - cy) ** 2), 0)
  ));

  // Generate organic shapes for each territory
  for (const t of territories) {
    const poly = computeVoronoiPoly(t, bx, by, bw, bh);
    if (poly.length < 3) { t.shape = ''; continue; }

    // Perturb each edge of the polygon
    const allPoints = [];
    for (let i = 0; i < poly.length; i++) {
      const p1 = poly[i];
      const p2 = poly[(i + 1) % poly.length];

      const edgeLen = Math.sqrt((p2.x - p1.x) ** 2 + (p2.y - p1.y) ** 2);
      if (edgeLen < 2) {
        allPoints.push(p1);
        continue;
      }

      // Determine edge type and roughness
      let roughness;
      const external = isExternalEdge(p1, p2, bx, by, bw, bh);
      if (external) {
        // Coastline: high roughness, extra jaggedness
        roughness = 15 + rng() * 12;
      } else {
        const sharedId = findSharedTerritory(t, p1, p2);
        if (sharedId >= 0 && connSet.has(t.id + ',' + sharedId)) {
          // Interior border between connected territories: smooth
          roughness = 4 + rng() * 6;
        } else {
          // Coastline between unconnected territories
          roughness = 12 + rng() * 10;
        }
      }

      // Scale roughness by edge length
      roughness = Math.min(roughness, edgeLen * 0.3);

      const levels = edgeLen > 30 ? 4 : (edgeLen > 15 ? 3 : 2);
      const perturbed = perturbEdge(p1, p2, roughness, rng, levels);
      // Add all points except the last (which is the start of next edge)
      for (let j = 0; j < perturbed.length - 1; j++) {
        allPoints.push(perturbed[j]);
      }
    }

    // Convert to smooth bezier path
    t.shape = pointsToSmoothPath(allPoints, true);
  }

  // Store data for ocean rendering
  organicShapeData = {
    bounds: { x: bx, y: by, w: bw, h: bh },
    components: components,
    centerX: cx,
    centerY: cy,
    maxDist: maxDist
  };

  fullRender();
}

function clearShapes() {
  pushUndo('Clear shapes');
  territories.forEach(t => t.shape = null);
  organicShapeData = null;
  renderShapes();
}

// ============================================================
//  AUTO CLUSTERING (Label Propagation)
// ============================================================
function autoClusters() {
  if (territories.length === 0) return;
  pushUndo('Auto-cluster');

  // Build adjacency
  const adjMap = {};
  territories.forEach(t => adjMap[t.id] = []);
  connections.forEach(([a,b]) => {
    if (adjMap[a]) adjMap[a].push(b);
    if (adjMap[b]) adjMap[b].push(a);
  });

  // Initialize labels
  const label = {};
  territories.forEach(t => label[t.id] = t.id);

  // Iterate
  for (let iter = 0; iter < 30; iter++) {
    let changed = false;
    // Shuffle order
    const order = territories.map(t => t.id).sort(() => Math.random() - 0.5);
    for (const id of order) {
      const neighbors = adjMap[id];
      if (neighbors.length === 0) continue;
      // Count neighbor labels
      const counts = {};
      neighbors.forEach(n => {
        const l = label[n];
        counts[l] = (counts[l] || 0) + 1;
      });
      // Pick most common
      let maxCount = 0, maxLabel = label[id];
      for (const [l, c] of Object.entries(counts)) {
        if (c > maxCount || (c === maxCount && Math.random() > 0.5)) {
          maxCount = c; maxLabel = +l;
        }
      }
      if (label[id] !== maxLabel) {
        label[id] = maxLabel;
        changed = true;
      }
    }
    if (!changed) break;
  }

  // Collect clusters
  const clusters = {};
  territories.forEach(t => {
    const l = label[t.id];
    if (!clusters[l]) clusters[l] = [];
    clusters[l].push(t.id);
  });

  // Create bonuses from clusters
  bonuses = [];
  nextBonusId = 0;
  const clusterKeys = Object.keys(clusters).sort((a,b) => clusters[b].length - clusters[a].length);
  const regionNames = ['Alpha','Beta','Gamma','Delta','Epsilon','Zeta','Eta','Theta','Iota','Kappa',
    'Lambda','Mu','Nu','Xi','Omicron','Pi','Rho','Sigma','Tau','Upsilon'];
  clusterKeys.forEach((k, i) => {
    const ids = clusters[k];
    const id = nextBonusId++;
    const value = Math.max(1, ids.length - 1);
    bonuses.push({
      id, name: regionNames[i] || `Region ${i}`,
      value, color: BONUS_COLORS[i % BONUS_COLORS.length],
      territory_ids: ids
    });
    ids.forEach(tid => {
      const t = territories.find(t => t.id === tid);
      if (t) t.bonus_id = id;
    });
  });

  fullRender();
}

// ============================================================
//  EXPORT / IMPORT
// ============================================================
function buildExportJSON() {
  // Build adjacency lists
  const adjMap = {};
  territories.forEach(t => adjMap[t.id] = []);
  connections.forEach(([a,b]) => {
    adjMap[a].push(b);
    adjMap[b].push(a);
  });

  // Re-index territories 0..N-1
  const idMap = {};
  territories.forEach((t, i) => idMap[t.id] = i);

  const exportTerrs = territories.map((t, i) => {
    const adj = (adjMap[t.id] || []).map(a => idMap[a]).filter(x => x !== undefined).sort((a,b)=>a-b);
    const bonusIdx = bonuses.findIndex(b => b.territory_ids.includes(t.id));
    const obj = {
      id: i,
      name: t.name,
      bonus_id: bonusIdx >= 0 ? bonusIdx : 0,
      is_wasteland: t.is_wasteland,
      default_armies: t.default_armies,
      adjacent: adj,
    };
    // Add visual with shape and label position
    obj.visual = {
      path: t.shape || '',
      label_pos: [Math.round(t.x * 10)/10, Math.round(t.y * 10)/10]
    };
    return obj;
  });

  const exportBonuses = bonuses.map((b, i) => ({
    id: i,
    name: b.name,
    value: b.value,
    territory_ids: b.territory_ids.map(tid => idMap[tid]).filter(x => x !== undefined).sort((a,b)=>a-b)
  }));

  return {
    id: mapData.id,
    name: mapData.name,
    territories: exportTerrs,
    bonuses: exportBonuses,
    picking: { ...mapData.picking },
    settings: { ...mapData.settings }
  };
}

function showExport() {
  const json = JSON.stringify(buildExportJSON(), null, 2);
  showModal('Export Map JSON', `<textarea id="export-text">${escapeHtml(json)}</textarea>`,
    [
      {label:'Copy to Clipboard', cls:'primary', action:()=>{
        navigator.clipboard.writeText(document.getElementById('export-text').value);
      }},
      {label:'Download', cls:'primary', action:()=>{
        const blob = new Blob([document.getElementById('export-text').value], {type:'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = mapData.id + '.json';
        a.click();
      }},
      {label:'Close', action:closeModal}
    ]
  );
}

function showImport() {
  showModal('Import Map JSON', `<textarea id="import-text" placeholder="Paste map JSON here..."></textarea>`,
    [
      {label:'Import', cls:'primary', action:()=>{
        try {
          const data = JSON.parse(document.getElementById('import-text').value);
          importMap(data);
          closeModal();
        } catch(e) { alert('Invalid JSON: ' + e.message); }
      }},
      {label:'Cancel', action:closeModal}
    ]
  );
}

function importMap(data) {
  pushUndo('Import map');
  territories = [];
  connections = [];
  bonuses = [];
  nextTerrId = 0;
  nextBonusId = 0;

  mapData.id = data.id || 'imported';
  mapData.name = data.name || 'Imported Map';
  if (data.picking) mapData.picking = {...mapData.picking, ...data.picking};
  if (data.settings) mapData.settings = {...mapData.settings, ...data.settings};

  // Update settings UI
  document.getElementById('set-id').value = mapData.id;
  document.getElementById('set-name').value = mapData.name;
  document.getElementById('set-picks').value = mapData.picking.num_picks;
  document.getElementById('set-income').value = mapData.settings.base_income;
  document.getElementById('set-fog').checked = mapData.settings.fog_of_war;

  // Import territories
  const terrMap = {}; // old id -> new id
  if (data.territories) {
    data.territories.forEach(t => {
      const lx = t.visual ? t.visual.label_pos[0] : (100 + Math.random()*1000);
      const ly = t.visual ? t.visual.label_pos[1] : (100 + Math.random()*600);
      const id = nextTerrId++;
      terrMap[t.id] = id;
      territories.push({
        id, name: t.name, x: lx, y: ly,
        bonus_id: t.bonus_id || 0,
        is_wasteland: t.is_wasteland || false,
        default_armies: t.default_armies || 2,
        shape: (t.visual && t.visual.path) ? t.visual.path : null
      });
    });

    // Build connections from adjacency lists
    const connSet = new Set();
    data.territories.forEach(t => {
      (t.adjacent || []).forEach(adj => {
        const a = terrMap[t.id], b = terrMap[adj];
        if (a !== undefined && b !== undefined) {
          const key = Math.min(a,b)+','+Math.max(a,b);
          if (!connSet.has(key)) {
            connSet.add(key);
            connections.push([a, b]);
          }
        }
      });
    });
  }

  // Import bonuses
  if (data.bonuses) {
    data.bonuses.forEach((b, i) => {
      const id = nextBonusId++;
      bonuses.push({
        id, name: b.name, value: b.value,
        color: BONUS_COLORS[i % BONUS_COLORS.length],
        territory_ids: (b.territory_ids || []).map(tid => terrMap[tid]).filter(x => x !== undefined)
      });
    });
  }

  selectedTerr = null; selectedBonus = null;
  fullRender();
  fitView();
}

// ============================================================
//  MODAL SYSTEM
// ============================================================
let currentModal = null;
function showModal(title, bodyHtml, buttons) {
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.onclick = e => { if (e.target === overlay) closeModal(); };
  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.innerHTML = `<h3>${title}</h3>${bodyHtml}<div class="actions">${
    buttons.map(b => `<button class="${b.cls||''}" data-action="${b.label}">${b.label}</button>`).join('')
  }</div>`;
  buttons.forEach(b => {
    modal.querySelector(`[data-action="${b.label}"]`).onclick = b.action;
  });
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
  currentModal = overlay;
}
function closeModal() {
  if (currentModal) { currentModal.remove(); currentModal = null; }
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ============================================================
//  KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  if (e.key === 's' || e.key === 'S') setMode('select');
  else if (e.key === 't' || e.key === 'T') setMode('territory');
  else if (e.key === 'c' || e.key === 'C') setMode('connection');
  else if (e.key === 'l' || e.key === 'L') autoLayout();
  else if (e.key === 'g' || e.key === 'G') generateShapes();
  else if (e.key === 'k' || e.key === 'K') autoClusters();
  else if (e.key === 'Delete' || e.key === 'Backspace') {
    if (selectedTerr !== null) deleteSelectedTerritory();
  }
  else if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
  else if (e.key === 'Escape') {
    connStart = null;
    addingTerrToBonus = false;
    document.getElementById('conn-preview').style.display = 'none';
    setMode('select');
  }
  else if (e.key === 'f' || e.key === 'F') fitView();
});

// ============================================================
//  INIT
// ============================================================
window.addEventListener('resize', () => { initView(); fullRender(); });
initView();
fullRender();
</script>
