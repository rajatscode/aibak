<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>strat.club — Feedback</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="description" content="Competitive territory strategy. 1v1, pure skill, zero luck. Play free at strat.club">
<meta property="og:title" content="strat.club">
<meta property="og:description" content="Competitive territory strategy. 1v1, pure skill, zero luck.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://strat.club">
<meta name="theme-color" content="#0d1117">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#0f1419;--bg3:#1a1f2e;--border:#21293a;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --blue:#4a9eff;--red:#f87171;--green:#34d399;--gold:#fbbf24;
}
html,body{min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text)}

.content{max-width:680px;margin:0 auto;padding:24px 16px}
h2{font-size:20px;font-weight:700;margin-bottom:16px}

.submit-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:24px}
.submit-box textarea{width:100%;min-height:80px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;padding:10px;resize:vertical;font-family:inherit}
.submit-box textarea:focus{outline:none;border-color:var(--blue)}
.submit-row{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.char-count{font-size:11px;color:var(--text3)}
.btn{padding:6px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);transition:all .15s}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:#1d4ed8}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.login-hint{font-size:12px;color:var(--text2)}
.login-hint a{color:var(--blue);text-decoration:none}

.feedback-list{display:flex;flex-direction:column;gap:8px}
.feedback-item{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;display:flex;gap:12px}
.vote-col{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:40px}
.vote-btn{background:none;border:none;cursor:pointer;font-size:16px;color:var(--text3);padding:2px 6px;border-radius:4px;transition:color .15s}
.vote-btn:hover{color:var(--text)}
.vote-btn.active-up{color:var(--green)}
.vote-btn.active-down{color:var(--red)}
.vote-score{font-size:14px;font-weight:700;color:var(--text)}
.feedback-body{flex:1;min-width:0}
.feedback-content{font-size:13px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.feedback-meta{font-size:11px;color:var(--text3);margin-top:6px;display:flex;gap:12px;align-items:center}
.feedback-meta .author{color:var(--text2);font-weight:600}
.delete-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;padding:0}
.delete-btn:hover{color:var(--red)}
.resolve-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;padding:0}
.resolve-btn:hover{color:var(--green)}
.feedback-item.resolved{opacity:0.5}
.resolved-badge{font-size:10px;color:var(--green);font-weight:600;border:1px solid var(--green);border-radius:4px;padding:1px 6px}
.resolved-section-label{font-size:12px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;padding:16px 0 8px}

.empty-state{text-align:center;padding:48px 16px;color:var(--text2);font-size:14px}
#toast-container{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 20px;font-size:13px;opacity:0;transform:translateY(-10px);transition:opacity .3s,transform .3s;pointer-events:auto}
.toast.show{opacity:1;transform:translateY(0)}
.toast.error{border-color:var(--red);background:#2d1013}
.toast.success{border-color:var(--green);background:#0d2818}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}

/* ========== RESPONSIVE ========== */
@media (max-width: 768px) {
  .nav-links-desktop{display:none !important}
  .hamburger-btn{display:block !important}
  #mobile-nav-dropdown.open{display:flex !important}
  .feedback-item{flex-direction:column;gap:8px}
  .vote-col{flex-direction:row;min-width:unset}
  .vote-btn{font-size:20px;padding:6px 10px;min-height:44px}
  .submit-box textarea{width:100%;font-size:16px}
}
@media (max-width: 480px) {
  .submit-box textarea{min-height:60px;font-size:16px}
  .feedback-content{font-size:14px}
  .submit-row{flex-direction:column;align-items:stretch;gap:8px}
  .submit-row .btn{width:100%;min-height:44px}
}
</style>
</head>
<body>
<div style="position:fixed;bottom:8px;right:8px;z-index:9999;background:#d29922;color:#000;font-size:10px;font-weight:700;padding:3px 10px;border-radius:4px;opacity:0.75;">ALPHA — expect bugs</div>
<nav id="main-nav" style="background:#0f1419;border-bottom:1px solid #21293a;padding:0 16px;display:flex;align-items:center;justify-content:space-between;font-size:12px;height:48px;position:relative;">
  <a href="/" style="color:#fbbf24;font-weight:700;text-decoration:none;font-size:14px;">strat.club</a>
  <div class="nav-links-desktop" style="display:flex;gap:16px;align-items:center;">
    <a href="/" style="color:#8b949e;text-decoration:none;">Play</a>
    <a href="/games" style="color:#8b949e;text-decoration:none;">Games</a>
    <a href="/ladder" style="color:#8b949e;text-decoration:none;">Ladder</a>
    <a href="/feedback" style="color:#fff;text-decoration:none;">Feedback</a>
    <a href="https://discord.gg/URuwbk42bB" target="_blank" style="color:#5865F2;text-decoration:none;font-weight:600;">Discord</a>
  </div>
  <button class="hamburger-btn" onclick="document.getElementById('mobile-nav-dropdown').classList.toggle('open')" style="display:none;background:none;border:none;color:#e6edf3;font-size:22px;cursor:pointer;padding:8px;">&#9776;</button>
  <div id="mobile-nav-dropdown" style="display:none;position:absolute;top:48px;left:0;right:0;background:#0f1419;border-bottom:1px solid #21293a;flex-direction:column;padding:8px 16px;gap:8px;z-index:100;">
    <a href="/" style="color:#8b949e;text-decoration:none;padding:10px 0;display:block;border-bottom:1px solid #21293a;">Play</a>
    <a href="/games" style="color:#8b949e;text-decoration:none;padding:10px 0;display:block;border-bottom:1px solid #21293a;">Games</a>
    <a href="/ladder" style="color:#8b949e;text-decoration:none;padding:10px 0;display:block;border-bottom:1px solid #21293a;">Ladder</a>
    <a href="/feedback" style="color:#fff;text-decoration:none;padding:10px 0;display:block;border-bottom:1px solid #21293a;">Feedback</a>
    <a href="https://discord.gg/URuwbk42bB" target="_blank" style="color:#5865F2;text-decoration:none;padding:10px 0;display:block;font-weight:600;">Discord</a>
  </div>
</nav>

<div class="content">
  <h2>Feedback</h2>

  <div class="submit-box" id="submit-box">
    <div class="login-hint" id="login-hint" style="display:none">
      <a href="/api/auth/discord">Sign in with Discord</a> to submit feedback and vote.
    </div>
    <div id="submit-form" style="display:none">
      <textarea id="feedback-input" maxlength="2000" placeholder="Share your feedback, ideas, or bug reports..."></textarea>
      <div class="submit-row">
        <span class="char-count"><span id="char-count">0</span>/2000</span>
        <button class="btn btn-primary" id="submit-btn" disabled>Submit</button>
      </div>
    </div>
  </div>

  <div class="feedback-list" id="feedback-list">
    <div class="empty-state">Loading feedback...</div>
  </div>
</div>

<div id="toast-container"></div>
<footer style="width:100%;text-align:center;padding:24px 16px;font-size:12px;color:#8b949e;border-top:1px solid #21293a;margin-top:24px;">
  strat.club
</footer>

<script>
let currentUser = null;
const ADMIN_USERNAMES = ['minisoldr'];

function toast(msg, type) {
  var el = document.createElement('div');
  el.className = 'toast ' + (type||'');
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  requestAnimationFrame(function(){el.classList.add('show');});
  setTimeout(function(){el.classList.remove('show');setTimeout(function(){el.remove();},300);}, 2500);
}

async function checkAuth() {
  try {
    const res = await fetch('/api/auth/me');
    if (res.ok) {
      currentUser = await res.json();
      document.getElementById('submit-form').style.display = '';
      document.getElementById('login-hint').style.display = 'none';
    } else {
      document.getElementById('submit-form').style.display = 'none';
      document.getElementById('login-hint').style.display = '';
    }
  } catch {
    document.getElementById('submit-form').style.display = 'none';
    document.getElementById('login-hint').style.display = '';
  }
}

const input = document.getElementById('feedback-input');
const charCount = document.getElementById('char-count');
const submitBtn = document.getElementById('submit-btn');

input.addEventListener('input', () => {
  charCount.textContent = input.value.length;
  submitBtn.disabled = input.value.trim().length === 0;
});

submitBtn.addEventListener('click', async () => {
  const content = input.value.trim();
  if (!content) return;
  submitBtn.disabled = true;
  try {
    const res = await fetch('/api/feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content })
    });
    if (res.ok) {
      input.value = '';
      charCount.textContent = '0';
      loadFeedback();
    } else {
      const err = await res.text();
      toast('Error: ' + err, 'error');
    }
  } catch (e) {
    toast('Failed to submit: ' + e.message, 'error');
  }
  submitBtn.disabled = input.value.trim().length === 0;
});

function timeAgo(dateStr) {
  const secs = Math.floor((Date.now() - new Date(dateStr).getTime()) / 1000);
  if (secs < 60) return 'just now';
  if (secs < 3600) return Math.floor(secs / 60) + 'm ago';
  if (secs < 86400) return Math.floor(secs / 3600) + 'h ago';
  return Math.floor(secs / 86400) + 'd ago';
}

async function loadFeedback() {
  const list = document.getElementById('feedback-list');
  try {
    const res = await fetch('/api/feedback?limit=50');
    if (!res.ok) {
      list.innerHTML = '<div class="empty-state">Could not load feedback. Database may not be configured.</div>';
      return;
    }
    const items = await res.json();
    if (items.length === 0) {
      list.innerHTML = '<div class="empty-state">No feedback yet. Be the first!</div>';
      return;
    }
    const unresolved = items.filter(i => !i.resolved);
    const resolved = items.filter(i => i.resolved);

    function renderItem(item) {
      const score = item.upvotes - item.downvotes;
      const isOwner = currentUser && currentUser.id === item.user_id;
      const isAdmin = currentUser && ADMIN_USERNAMES.includes(currentUser.username);
      const canManage = isOwner || isAdmin;
      return `<div class="feedback-item${item.resolved ? ' resolved' : ''}" data-id="${item.id}">
        <div class="vote-col">
          <button class="vote-btn up" onclick="vote('${escId(item.id)}',1)" title="Upvote">&#9650;</button>
          <span class="vote-score">${score}</span>
          <button class="vote-btn down" onclick="vote('${escId(item.id)}',-1)" title="Downvote">&#9660;</button>
        </div>
        <div class="feedback-body">
          <div class="feedback-content">${escapeHtml(item.content)}</div>
          <div class="feedback-meta">
            <span class="author">${escapeHtml(item.username)}</span>
            <span>${timeAgo(item.created_at)}</span>
            ${item.resolved ? '<span class="resolved-badge">Resolved</span>' : ''}
            ${canManage ? `<button class="resolve-btn" onclick="resolveFeedback('${escId(item.id)}')">${item.resolved ? 'unresolve' : 'resolve'}</button>` : ''}
            ${canManage ? `<button class="delete-btn" onclick="deleteFeedback('${escId(item.id)}')">delete</button>` : ''}
          </div>
        </div>
      </div>`;
    }

    let html = unresolved.map(renderItem).join('');
    if (resolved.length > 0) {
      html += '<div class="resolved-section-label">Resolved</div>';
      html += resolved.map(renderItem).join('');
    }
    list.innerHTML = html;
  } catch {
    list.innerHTML = '<div class="empty-state">Failed to load feedback.</div>';
  }
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function escId(s) { return String(s).replace(/['"\\]/g, ''); }

async function vote(id, direction) {
  if (!currentUser) { toast('Sign in to vote', 'error'); return; }
  try {
    const res = await fetch(`/api/feedback/${id}/vote`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ direction })
    });
    if (!res.ok) throw new Error(await res.text());
    loadFeedback();
  } catch (e) { toast('Vote failed: ' + e.message, 'error'); }
}

async function resolveFeedback(id) {
  if (!currentUser) return;
  try {
    const res = await fetch(`/api/feedback/${id}/resolve`, { method: 'POST' });
    if (!res.ok) throw new Error(await res.text());
    loadFeedback();
  } catch (e) { toast('Action failed: ' + e.message, 'error'); }
}

var deleteConfirmId = null;
async function deleteFeedback(id) {
  if (deleteConfirmId !== id) {
    deleteConfirmId = id;
    var btn = document.querySelector('.feedback-item[data-id="'+id+'"] .delete-btn');
    if (btn) { btn.textContent = 'confirm delete'; btn.style.color = 'var(--red)'; btn.style.fontWeight = '700'; }
    setTimeout(function() { deleteConfirmId = null; if (btn) { btn.textContent = 'delete'; btn.style.color = ''; btn.style.fontWeight = ''; } }, 3000);
    return;
  }
  deleteConfirmId = null;
  try {
    const res = await fetch(`/api/feedback/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error(await res.text());
    loadFeedback();
  } catch (e) { toast('Delete failed: ' + e.message, 'error'); }
}

checkAuth();
loadFeedback();
</script>
</body>
</html>
